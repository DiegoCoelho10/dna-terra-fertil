<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Feed · DNA Terra Fértil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--card:#0f0f0f;--red:#8B1717;--rb:#D93A3A;
  --border:rgba(255,255,255,.08);--w:#fff;--dim:rgba(255,255,255,.55);--dimmer:rgba(255,255,255,.28);
  --green:#4caf50;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{min-height:100%;background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* ONBOARDING */
#onboard{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 42%,#1a0505 0%,var(--bg) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;padding:24px}
#onboard.hide{display:none}
.ob-logo{width:80px;height:auto;opacity:.85;margin-bottom:4px}
.ob-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,10vw,56px);letter-spacing:.12em;color:var(--w)}
.ob-sub{font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;color:var(--dim);letter-spacing:.15em;text-align:center}
.ob-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dimmer);margin-top:12px}
.ob-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-bottom-color:rgba(255,255,255,.35);color:var(--w);font-family:'Inter',sans-serif;font-size:18px;padding:14px 20px;outline:none;width:min(280px,90vw);text-align:center;border-radius:0;-webkit-appearance:none;transition:border-color .2s}
.ob-input:focus{border-bottom-color:var(--rb)}
.ob-btn{background:var(--red);color:var(--w);border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:15px 40px;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);transition:background .2s;min-height:50px;margin-top:4px}
.ob-btn:hover{background:#a01e1e}
.ob-err{color:rgba(255,120,120,.9);font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;min-height:18px}

/* HEADER */
.header{background:rgba(8,8,8,.97);border-bottom:1px solid var(--border);padding:11px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding-top:calc(var(--sat) + 11px)}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:var(--w)}
.header-title{font-family:'Crimson Pro',serif;font-style:italic;font-size:13px;color:var(--dim);margin-left:8px}
.header-user{font-size:11px;color:var(--dimmer);letter-spacing:.08em;cursor:pointer}
.header-user:hover{color:var(--w)}

/* FEED */
.feed{max-width:500px;margin:0 auto;padding:16px;padding-bottom:24px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.3}
.empty-text{font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;color:var(--dim)}

/* POST CARD */
.post{background:var(--card);border:1px solid var(--border);margin-bottom:20px;overflow:hidden}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
.post-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--red);display:flex;align-items:center;justify-content:center}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-info{flex:1;min-width:0}
.post-church{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--w)}
.post-date{font-size:11px;color:var(--dimmer);margin-top:1px}
.post-culto-badge{font-size:9px;letter-spacing:.2em;text-transform:uppercase;background:rgba(217,58,58,.15);color:var(--rb);border:1px solid rgba(217,58,58,.2);padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block}
.post-img{width:100%;max-height:400px;object-fit:cover;display:block}
.post-actions{display:flex;align-items:center;gap:4px;padding:10px 14px 8px}
.btn-heart{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;gap:5px;color:var(--dim);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s;-webkit-appearance:none}
.btn-heart svg{width:24px;height:24px;transition:all .25s}
.btn-heart.liked svg{fill:#ff3b5c;stroke:#ff3b5c;transform:scale(1.15)}
.btn-heart.liked{color:#ff3b5c}
.btn-heart:hover svg{transform:scale(1.1)}
.btn-comment-action{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;gap:5px;color:var(--dim);font-family:'Inter',sans-serif;font-size:13px;-webkit-appearance:none;transition:color .2s}
.btn-comment-action:hover{color:var(--w)}
.btn-comment-action svg{width:22px;height:22px}
.post-caption{padding:0 14px 10px}
.post-caption-author{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--w);margin-right:5px}
.post-caption-text{font-family:'Inter',sans-serif;font-size:13px;color:var(--dim);line-height:1.5}
.post-stats{padding:0 14px 4px;display:flex;align-items:center;gap:12px}
.post-likes{font-size:12px;font-weight:600;color:var(--w)}
.post-cadastros{font-size:11px;color:var(--rb);letter-spacing:.08em}

/* COMMENTS */
.comments-section{border-top:1px solid var(--border);padding:10px 14px 12px}
.comment-item{display:flex;gap:8px;margin-bottom:8px}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:rgba(139,23,23,.3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--rb);flex-shrink:0;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
.comment-body{flex:1}
.comment-author{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--w);margin-right:5px}
.comment-text{font-family:'Inter',sans-serif;font-size:12px;color:var(--dim);line-height:1.5}
.comment-time{font-size:10px;color:var(--dimmer);margin-top:2px}
.comment-input-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
.comment-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--w);font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;outline:none;border-radius:20px;-webkit-appearance:none;transition:border-color .2s}
.comment-input:focus{border-color:rgba(217,58,58,.35)}
.comment-input::placeholder{color:rgba(255,255,255,.2)}
.btn-send{background:none;border:none;cursor:pointer;color:var(--rb);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 4px;-webkit-appearance:none;opacity:.5;transition:opacity .2s}
.btn-send.active{opacity:1}
.ver-mais{font-size:12px;color:var(--dimmer);cursor:pointer;margin-bottom:6px}
.ver-mais:hover{color:var(--w)}

/* LOADING */
.loading-pulse{display:flex;flex-direction:column;gap:14px;padding:16px}
.pulse-block{background:rgba(255,255,255,.04);border-radius:2px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* HEART ANIMATION */
.heart-burst{position:fixed;pointer-events:none;font-size:28px;z-index:9999;animation:heartBurst .7s ease-out forwards}
@keyframes heartBurst{0%{transform:scale(0) translateY(0);opacity:1}60%{transform:scale(1.4) translateY(-30px);opacity:1}100%{transform:scale(1) translateY(-60px);opacity:0}}

/* Bottom nav — oculto */
#dna-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.97);border-top:1px solid rgba(255,255,255,.08);display:none;align-items:center;justify-content:space-around;padding:8px 0;z-index:9000}
#dna-nav.show{display:none}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(18,4,4,.97);border:1px solid rgba(217,58,58,.35);border-left:3px solid var(--rb);color:var(--w);font-family:'Crimson Pro',serif;font-size:14px;font-style:italic;padding:11px 18px;max-width:min(300px,88vw);text-align:center;z-index:9000;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none;visibility:hidden;border-radius:4px}
#toast.show{transform:translateX(-50%) translateY(0);visibility:visible}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboard">
  <img src="icon-192.png" alt="Terra Fértil" class="ob-logo">
  <div class="ob-title">DNA</div>
  <div class="ob-sub">Feed do Ministério</div>
  <div class="ob-label">Como você quer aparecer?</div>
  <input type="text" class="ob-input" id="ob-nome" placeholder="Seu nome" autocapitalize="words" maxlength="30" onkeydown="if(event.key==='Enter')salvarNome()">
  <div class="ob-err" id="ob-err"></div>
  <button class="ob-btn" onclick="salvarNome()">Entrar no Feed</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <div style="display:flex;align-items:center">
      <div class="header-logo">DNA</div>
      <div class="header-title">Feed</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="header-user" id="header-user" onclick="trocarNome()">👤 <span id="user-display"></span></div>
      <button onclick="openDrawer()" style="background:none;border:1px solid rgba(255,255,255,.12);color:#fff;font-size:18px;padding:5px 11px;cursor:pointer;border-radius:4px;line-height:1">☰</button>
    </div>
  </div>
  <div class="feed" id="feed">
    <div class="loading-pulse">
      <div class="pulse-block" style="height:300px"></div>
      <div class="pulse-block" style="height:240px"></div>
    </div>
  </div>
</div>

<nav id="dna-nav"></nav>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, updateDoc, query, orderBy, onSnapshot, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const _app = initializeApp({
  apiKey:"AIzaSyC46bONBdDeVbK4e7E_zIgveEokleOpKa4",
  authDomain:"dna-terra-fertil.firebaseapp.com",
  projectId:"dna-terra-fertil",
  storageBucket:"dna-terra-fertil.firebasestorage.app",
  messagingSenderId:"937958327076",
  appId:"1:937958327076:web:07a7ace0e689e08f0ae9b1"
});
const db = getFirestore(_app);
const auth = getAuth(_app);

// Auth check — constrói drawer com papel do usuário
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.replace('index.html'); return; }
  try {
    const { getDoc, doc: fbDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDoc(fbDoc(db,'usuarios',user.uid));
    if(!snap.exists()||snap.data().status!=='aprovado'){window.location.replace('index.html');return;}
    const papel=snap.data().papel||'voluntario';
    buildDrawer(papel, 'feed.html');
  } catch(e){console.error(e);}
});

// Sair — exposto globalmente para o drawer
window.sair = async function() {
  await signOut(auth);
  window.location.replace('index.html');
};

let meuNome = localStorage.getItem('dna_feed_nome') || '';
let posts = [];

// ── ONBOARDING ──
window.salvarNome = function() {
  const val = document.getElementById('ob-nome').value.trim();
  if (!val || val.length < 2) {
    document.getElementById('ob-err').textContent = 'Digite seu nome para continuar.';
    return;
  }
  meuNome = val;
  localStorage.setItem('dna_feed_nome', val);
  document.getElementById('onboard').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = meuNome;
  loadFeed();
};

window.trocarNome = function() {
  const novo = prompt('Como quer aparecer nos comentários?', meuNome);
  if (novo && novo.trim().length >= 2) {
    meuNome = novo.trim();
    localStorage.setItem('dna_feed_nome', meuNome);
    document.getElementById('user-display').textContent = meuNome;
    showToast('Nome atualizado!');
  }
};

if (meuNome) {
  document.getElementById('onboard').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = meuNome;
  loadFeed();
}

// ── LOAD FEED ──
function loadFeed() {
  onSnapshot(
    query(collection(db,'feed_posts'), orderBy('timestamp','desc')),
    (snap) => {
      posts = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderFeed();
    }
  );
}

function renderFeed() {
  const cont = document.getElementById('feed');
  if (!posts.length) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">📸</div><div class="empty-text">Nenhum culto registrado ainda.<br>Em breve as fotos aparecem aqui!</div></div>';
    return;
  }
  cont.innerHTML = posts.map(post => buildPost(post)).join('');
}

function buildPost(post) {
  const likes = post.likes || [];
  const comments = post.comments || [];
  const liked = likes.includes(meuNome);
  const likeCount = likes.length;
  const topComments = comments.slice(-3);
  const hasMore = comments.length > 3;

  return `
    <div class="post" id="post-${post.id}">
      <div class="post-header">
        <div class="post-avatar">
          <img src="icon-192.png" alt="TF">
        </div>
        <div class="post-info">
          <div class="post-church">Ministério Terra Fértil</div>
          <div class="post-date">${formatDate(post.timestamp)}</div>
          <div class="post-culto-badge">${post.culto || 'Culto'}</div>
        </div>
      </div>
      ${post.imageUrl ? `<img class="post-img" src="${post.imageUrl}" alt="Foto do culto" loading="lazy">` : ''}
      <div class="post-actions">
        <button class="btn-heart ${liked?'liked':''}" onclick="toggleLike('${post.id}', ${liked})">
          <svg viewBox="0 0 24 24" fill="${liked?'#ff3b5c':'none'}" stroke="${liked?'#ff3b5c':'currentColor'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          ${likeCount > 0 ? likeCount : ''}
        </button>
        <button class="btn-comment-action" onclick="focusComment('${post.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          ${comments.length > 0 ? comments.length : ''}
        </button>
      </div>
      ${post.cadastros ? `<div class="post-stats"><span class="post-cadastros">✦ ${post.cadastros} pessoa${post.cadastros!==1?'s':''} acolhida${post.cadastros!==1?'s':''} neste culto</span></div>` : ''}
      ${post.caption ? `<div class="post-caption"><span class="post-caption-author">terrafertil</span><span class="post-caption-text"> ${post.caption}</span></div>` : ''}
      <div class="comments-section">
        ${hasMore ? `<div class="ver-mais" onclick="verTodos('${post.id}')">Ver todos os ${comments.length} comentários</div>` : ''}
        ${topComments.map(c => buildComment(c)).join('')}
        <div class="comment-input-row">
          <input class="comment-input" id="cinput-${post.id}" placeholder="Adicione um comentário..."
            oninput="toggleSend('${post.id}')"
            onkeydown="if(event.key==='Enter')enviarComentario('${post.id}')">
          <button class="btn-send" id="csend-${post.id}" onclick="enviarComentario('${post.id}')">Publicar</button>
        </div>
      </div>
    </div>`;
}

function buildComment(c) {
  const ini = (c.autor||'?').slice(0,2).toUpperCase();
  return `<div class="comment-item">
    <div class="comment-avatar">${ini}</div>
    <div class="comment-body">
      <span class="comment-author">${c.autor}</span>
      <span class="comment-text">${c.texto}</span>
      <div class="comment-time">${c.hora||''}</div>
    </div>
  </div>`;
}

window.toggleLike = async function(postId, jaLikei) {
  try {
    const ref = doc(db,'feed_posts',postId);
    if (jaLikei) {
      await updateDoc(ref, {likes: arrayRemove(meuNome)});
    } else {
      await updateDoc(ref, {likes: arrayUnion(meuNome)});
      const btn = document.querySelector(`#post-${postId} .btn-heart`);
      if (btn) {
        const rect = btn.getBoundingClientRect();
        const heart = document.createElement('div');
        heart.className = 'heart-burst';
        heart.textContent = '❤️';
        heart.style.left = rect.left + 'px';
        heart.style.top = rect.top + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 800);
      }
    }
  } catch(e) { showToast('Erro ao curtir.'); }
};

window.toggleSend = function(postId) {
  const inp = document.getElementById('cinput-' + postId);
  const btn = document.getElementById('csend-' + postId);
  if (btn) btn.classList.toggle('active', inp.value.trim().length > 0);
};

window.focusComment = function(postId) {
  const inp = document.getElementById('cinput-' + postId);
  if (inp) { inp.focus(); inp.scrollIntoView({behavior:'smooth', block:'center'}); }
};

window.enviarComentario = async function(postId) {
  const inp = document.getElementById('cinput-' + postId);
  const texto = inp.value.trim();
  if (!texto) return;
  inp.value = '';
  toggleSend(postId);
  const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  try {
    await updateDoc(doc(db,'feed_posts',postId), {
      comments: arrayUnion({autor:meuNome, texto, hora, ts:Date.now()})
    });
  } catch(e) { showToast('Erro ao comentar.'); }
};

window.verTodos = function(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post) return;
  const section = document.querySelector(`#post-${postId} .comments-section`);
  if (!section) return;
  const allComments = (post.comments||[]).map(c => buildComment(c)).join('');
  const inputRow = section.querySelector('.comment-input-row').outerHTML;
  section.innerHTML = allComments + inputRow;
  const ci = section.querySelector('.comment-input');
  ci.oninput = () => toggleSend(postId);
  ci.onkeydown = (e) => { if(e.key==='Enter') enviarComentario(postId); };
  section.querySelector('.btn-send').onclick = () => enviarComentario(postId);
};

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.seconds ? new Date(ts.seconds*1000) : new Date(ts);
  return d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
}
</script>

<!-- DRAWER -->
<div id="drw-ov" onclick="closeDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;backdrop-filter:blur(2px)"></div>
<div id="drw" style="position:fixed;right:0;top:0;bottom:0;width:min(280px,85vw);background:#0e0e0e;border-left:1px solid rgba(217,58,58,.2);z-index:9991;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column">
  <div style="padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:#fff">DNA</span>
    <button onclick="closeDrawer()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:24px;cursor:pointer;line-height:1;padding:4px">×</button>
  </div>
  <nav id="drw-nav" style="flex:1;padding:8px 0;overflow-y:auto"></nav>
  <div style="padding:16px;border-top:1px solid rgba(255,255,255,.08)">
    <button onclick="sair()" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:rgba(217,58,58,.1);border:1px solid rgba(217,58,58,.2);color:rgba(255,120,120,.85);font-family:Inter,sans-serif;font-size:13px;cursor:pointer;border-radius:6px"><span style="font-size:18px">🚪</span> Sair da conta</button>
  </div>
</div>

<script>
function openDrawer(){document.getElementById('drw').style.transform='translateX(0)';document.getElementById('drw-ov').style.display='block';}
function closeDrawer(){document.getElementById('drw').style.transform='translateX(100%)';document.getElementById('drw-ov').style.display='none';}
function buildDrawer(papel,active){
  const all=[
    {href:'index.html',icon:'🌱',label:'Cadastro',roles:['voluntario','lider','admin']},
    {href:'lider.html',icon:'👤',label:'Líder',roles:['lider','admin']},
    {href:'mapa.html',icon:'🗺️',label:'Mapa',roles:['lider','admin']},
    {href:'feed.html',icon:'📸',label:'Feed',roles:['voluntario','lider','admin']},
    {href:'admin.html',icon:'⚙️',label:'Admin',roles:['admin']},
  ];
  document.getElementById('drw-nav').innerHTML=all.filter(i=>i.roles.includes(papel)).map(i=>`<a href="${i.href}" style="display:flex;align-items:center;gap:14px;padding:14px 20px;color:${i.href===active?'#D93A3A':'rgba(255,255,255,.65)'};text-decoration:none;font-family:Inter,sans-serif;font-size:14px;font-weight:${i.href===active?600:400};border-left:3px solid ${i.href===active?'#D93A3A':'transparent'};background:${i.href===active?'rgba(217,58,58,.06)':'none'}"><span style="font-size:20px">${i.icon}</span> ${i.label}</a>`).join('');
}
</script>
