<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Líder · DNA Terra Fértil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--card:#111;--red:#8B1717;--rb:#D93A3A;--border:rgba(255,255,255,.08);--w:#fff;--dim:rgba(255,255,255,.55);--dimmer:rgba(255,255,255,.28);--green:#4caf50;--amber:#f59e0b;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
html,body{min-height:100%;background:var(--bg);color:var(--w);font-family:"Inter",sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

#gate{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 42%,#1a0505 0%,var(--bg) 70%);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;padding:24px}
#gate.hidden{display:none}
.gate-img{width:clamp(60px,16vw,80px);height:auto;opacity:.85;margin-bottom:4px}
.gate-logo{font-family:"Bebas Neue",sans-serif;font-size:clamp(44px,12vw,72px);letter-spacing:.15em;color:var(--w);position:relative}
.gate-logo::after{content:"DNA";position:absolute;inset:0;color:var(--rb);filter:blur(24px);opacity:.2}
.gate-sub{font-family:"Crimson Pro",serif;font-style:italic;font-size:14px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:-4px}
.gate-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dimmer);margin-top:10px}
.gate-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-bottom-color:rgba(255,255,255,.3);color:var(--w);font-family:"Inter",sans-serif;font-size:16px;padding:12px 16px;outline:none;width:min(280px,88vw);border-radius:0;-webkit-appearance:none;transition:border-color .2s}
.gate-input:focus{border-bottom-color:var(--rb)}
.gate-input::placeholder{color:rgba(255,255,255,.2)}
.gate-btn{background:var(--red);color:var(--w);border:none;font-family:"Inter",sans-serif;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:14px 40px;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);transition:background .2s;min-height:48px;-webkit-appearance:none}
.gate-btn:hover{background:#a01e1e}
.gate-btn:disabled{opacity:.5;cursor:not-allowed}
.gate-err{color:rgba(255,120,120,.9);font-family:"Crimson Pro",serif;font-style:italic;font-size:13px;min-height:18px;text-align:center;max-width:min(280px,88vw)}
.gate-google{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--w);font-family:"Inter",sans-serif;font-size:13px;padding:12px 20px;cursor:pointer;width:min(280px,88vw);display:flex;align-items:center;justify-content:center;gap:10px;-webkit-appearance:none;transition:background .2s}
.gate-google:hover{background:rgba(255,255,255,.12)}
.gate-div{display:flex;align-items:center;gap:10px;color:var(--dimmer);font-size:11px;letter-spacing:.2em;text-transform:uppercase;width:min(280px,88vw)}
.gate-div::before,.gate-div::after{content:"";flex:1;height:1px;background:var(--border)}
.gate-forgot{background:none;border:none;color:var(--dimmer);font-family:"Inter",sans-serif;font-size:12px;cursor:pointer;-webkit-appearance:none}

#app{display:none;min-height:100vh}
.header{background:rgba(8,8,8,.97);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding-top:calc(var(--sat) + 12px)}
.header-logo{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.12em;color:var(--w)}
.header-casa{font-family:"Crimson Pro",serif;font-style:italic;font-size:13px;color:var(--dim);margin-left:6px}
.stats-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--bg);padding:14px 10px;text-align:center}
.stat-val{font-family:"Bebas Neue",sans-serif;font-size:clamp(28px,7vw,40px);letter-spacing:.05em;color:var(--w);line-height:1}
.stat-val.red{color:var(--rb)}.stat-val.amber{color:var(--amber)}
.stat-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dimmer);margin-top:3px}
.content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:20px}
.section-title{font-family:"Bebas Neue",sans-serif;font-size:17px;letter-spacing:.08em;color:var(--dim);padding:7px 0 9px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;align-items:baseline;gap:10px}
.count-badge{font-family:"Inter",sans-serif;font-size:10px;font-weight:500;background:rgba(139,23,23,.25);color:var(--rb);padding:2px 9px;border-radius:20px}
.vcard{background:var(--card);border:1px solid var(--border);margin-bottom:9px;overflow:hidden}
.vcard-top{display:flex;align-items:flex-start;gap:12px;padding:14px}
.avatar{width:38px;height:38px;min-width:38px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:15px;color:var(--w);flex-shrink:0}
.vcard-info{flex:1;min-width:0}
.vcard-name{font-family:"Inter",sans-serif;font-size:15px;font-weight:600;color:var(--w);margin-bottom:4px}
.vcard-row{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.vi{width:11px;height:11px;stroke:var(--dimmer);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.vcard-text{font-size:12px;color:var(--dim)}
.vcard-meta{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:20px;font-weight:500}
.tag.primeira{background:rgba(217,58,58,.15);color:var(--rb);border:1px solid rgba(217,58,58,.25)}
.tag.retorno{background:rgba(76,175,80,.1);color:var(--green);border:1px solid rgba(76,175,80,.2)}
.tag.alert{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.tag.dias{background:rgba(255,255,255,.05);color:var(--dimmer);border:1px solid var(--border)}
.notes-area{border-top:1px solid var(--border);padding:10px 14px}
.notes-toggle{width:100%;background:none;border:none;color:var(--dimmer);font-family:"Inter",sans-serif;font-size:10px;letter-spacing:.25em;text-transform:uppercase;padding:6px 0;cursor:pointer;text-align:left;-webkit-appearance:none}
.notes-inner{display:none;padding-top:8px}
.notes-inner.open{display:block}
.notes-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--w);font-family:"Crimson Pro",serif;font-style:italic;font-size:14px;padding:9px 12px;outline:none;resize:none;border-radius:2px;min-height:60px;-webkit-appearance:none;transition:border-color .2s}
.notes-save{background:rgba(139,23,23,.25);border:1px solid rgba(217,58,58,.3);color:var(--rb);font-family:"Inter",sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 14px;cursor:pointer;margin-top:6px;border-radius:2px;-webkit-appearance:none}
.wa-row{border-top:1px solid var(--border);display:flex}
.wa-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 6px;background:none;border:none;cursor:pointer;font-family:"Inter",sans-serif;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;color:var(--dim);transition:background .2s;position:relative}
.wa-btn:not(:last-child){border-right:1px solid var(--border)}
.wa-btn:hover{background:rgba(37,211,102,.07);color:#25d366}
.wa-btn.sent{color:var(--green)}
.wa-btn svg{width:13px;height:13px;fill:currentColor}
.sent-badge{font-size:9px;color:var(--green);background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);padding:1px 5px;border-radius:10px;position:absolute;top:3px;right:5px}
.no-cel{opacity:.35;pointer-events:none}
.empty{text-align:center;padding:50px 20px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.3}
.empty-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.08em;color:var(--dim)}
.empty-text{font-family:"Crimson Pro",serif;font-style:italic;font-size:14px;color:var(--dimmer);margin-top:6px}

/* Bottom nav — oculto */
#dna-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.97);border-top:1px solid rgba(255,255,255,.08);display:none;align-items:center;justify-content:space-around;padding:8px 0;z-index:9000}
#dna-nav.show{display:none}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(18,4,4,.97);border:1px solid rgba(217,58,58,.35);border-left:3px solid var(--rb);color:var(--w);font-family:"Crimson Pro",serif;font-size:14px;font-style:italic;padding:11px 18px;max-width:min(300px,88vw);text-align:center;z-index:9000;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none;visibility:hidden;border-radius:4px}
#toast.show{transform:translateX(-50%) translateY(0);visibility:visible}
</style>
</head>
<body>

<div id="gate">
  <img src="icon-192.png" class="gate-img" alt="Terra Fértil">
  <div class="gate-logo">DNA</div>
  <div class="gate-sub">Painel do Líder</div>
  <div class="gate-label">E-mail</div>
  <input type="email" class="gate-input" id="gate-email" placeholder="seu@email.com" autocomplete="email" inputmode="email">
  <div class="gate-label" style="margin-top:6px">Senha</div>
  <input type="password" class="gate-input" id="gate-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
  <div class="gate-err" id="gate-err"></div>
  <button class="gate-btn" id="gate-btn" onclick="fazerLogin()">Entrar</button>
  <button class="gate-forgot" onclick="esqueceuSenha()">Esqueci minha senha</button>
  <div class="gate-div">ou</div>
  <button class="gate-google" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continuar com Google
  </button>
</div>

<div id="app">
  <div class="header">
    <div style="display:flex;align-items:center">
      <div class="header-logo">DNA</div>
      <div class="header-casa" id="header-casa">Painel do Líder</div>
    </div>
    <button onclick="openDrawer()" style="background:none;border:1px solid rgba(255,255,255,.12);color:#fff;font-size:18px;padding:5px 11px;cursor:pointer;border-radius:4px;line-height:1">☰</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val red" id="st-sugeridos">—</div><div class="stat-label">Sugeridos</div></div>
    <div class="stat"><div class="stat-val amber" id="st-pendentes">—</div><div class="stat-label">Sem contato</div></div>
  </div>

  <div class="content">
    <div class="section-title">Visitantes Indicados <span class="count-badge" id="count-badge">0</span></div>
    <div id="lista-visitantes"><div class="empty"><div class="empty-icon">🌱</div><div class="empty-title">Carregando...</div></div></div>
  </div>

  <nav id="dna-nav"></nav>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, updateDoc, doc, getDoc, setDoc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey:"AIzaSyC46bONBdDeVbK4e7E_zIgveEokleOpKa4",
  authDomain:"dna-terra-fertil.firebaseapp.com",
  projectId:"dna-terra-fertil",
  storageBucket:"dna-terra-fertil.firebasestorage.app",
  messagingSenderId:"937958327076",
  appId:"1:937958327076:web:07a7ace0e689e08f0ae9b1"
});
const db = getFirestore(app);
const auth = getAuth(app);
const gp = new GoogleAuthProvider();
let allVisitantes=[], allCasas=[], minhaCasa=null;

const _BOOTSTRAP=['dsdiegocoelho@gmail.com'];

// ── AUTH ──
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.replace('index.html'); return; }
  try {
    const email=(user.email||'').toLowerCase();
    let snap=await getDoc(doc(db,'usuarios',user.uid));
    if(_BOOTSTRAP.includes(email)){
      if(!snap.exists()||snap.data().papel!=='admin'){
        await setDoc(doc(db,'usuarios',user.uid),{uid:user.uid,email:user.email,nome:user.displayName||email.split('@')[0],papel:'admin',status:'aprovado',criadoEm:serverTimestamp()},{merge:true});
        snap=await getDoc(doc(db,'usuarios',user.uid));
      }
    } else if(!snap.exists()){
      window.location.replace('index.html'); return;
    }
    const dados=snap.data();
    if(dados.status==='pendente'||dados.status==='rejeitado'){window.location.replace('index.html');return;}
    if(!['lider','admin'].includes(dados.papel)){window.location.replace('index.html');return;}
    window._papel=dados.papel;
    buildDrawer(dados.papel, 'lider.html');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').style.display='block';
    await carregarDados(user.email);
  } catch(e){console.error('[Lider Auth]',e);window.location.replace('index.html');}
});

window.fazerLogin=async function(){
  const email=document.getElementById('gate-email').value.trim();
  const senha=document.getElementById('gate-pw').value;
  const err=document.getElementById('gate-err');
  const btn=document.getElementById('gate-btn');
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{await signInWithEmailAndPassword(auth,email,senha);}
  catch(e){err.textContent=tradErr(e.code);btn.disabled=false;btn.textContent='Entrar';}
};
window.loginGoogle=async function(){
  try{await signInWithPopup(auth,gp);}
  catch(e){if(e.code!=='auth/popup-closed-by-user')document.getElementById('gate-err').textContent=tradErr(e.code);}
};
window.esqueceuSenha=async function(){
  const email=document.getElementById('gate-email').value.trim();
  if(!email){document.getElementById('gate-err').textContent='Digite seu e-mail.';return;}
  try{await sendPasswordResetEmail(auth,email);document.getElementById('gate-err').style.color='rgba(76,175,80,.9)';document.getElementById('gate-err').textContent='✓ E-mail enviado!';}
  catch(e){document.getElementById('gate-err').textContent=tradErr(e.code);}
};
window.fazerLogout=async function(){await signOut(auth);window.location.replace('index.html');};
window.sair=window.fazerLogout;

async function carregarDados(emailUser){
  try{
    const [vs,cs]=await Promise.all([
      getDocs(query(collection(db,'visitantes'),orderBy('timestamp','desc'))),
      getDocs(query(collection(db,'casas'),orderBy('timestamp','asc')))
    ]);
    allVisitantes=vs.docs.map(d=>({id:d.id,...d.data()}));
    allCasas=cs.docs.map(d=>({id:d.id,...d.data()}));
    minhaCasa=allCasas.find(c=>(c.emailLider||'').toLowerCase()===emailUser.toLowerCase());
    if(minhaCasa){
      document.getElementById('header-casa').textContent=minhaCasa.nome;
      renderVisitantes();
    } else {
      document.getElementById('header-casa').textContent='Painel do Líder';
      document.getElementById('lista-visitantes').innerHTML='<div class="empty"><div class="empty-icon">🏠</div><div class="empty-title">Casa não vinculada</div><div class="empty-text">Peça ao admin para vincular seu e-mail à casa sacerdotal.</div></div>';
      document.getElementById('st-sugeridos').textContent='—';
      document.getElementById('st-pendentes').textContent='—';
    }
  }catch(e){console.error('[Lider dados]',e);}
}

function words(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>3);}
function sim(a,b){const wa=words(a),wb=words(b);return wa.filter(w=>wb.includes(w)).length;}

function renderVisitantes(){
  const sug=allVisitantes.filter(v=>v.endereco&&sim(v.endereco,minhaCasa.endereco)>0);
  const pend=sug.filter(v=>!v.msg1Sent&&!v.msg2Sent);
  document.getElementById('st-sugeridos').textContent=sug.length;
  document.getElementById('st-pendentes').textContent=pend.length;
  document.getElementById('count-badge').textContent=sug.length;
  if(!sug.length){document.getElementById('lista-visitantes').innerHTML='<div class="empty"><div class="empty-icon">🌱</div><div class="empty-title">Nenhum visitante sugerido</div><div class="empty-text">Visitantes próximos à sua casa aparecerão aqui.</div></div>';return;}
  document.getElementById('lista-visitantes').innerHTML=sug.map(v=>buildCard(v)).join('');
}

const WA='<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.025.507 3.934 1.395 5.61L0 24l6.562-1.376A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.894a9.878 9.878 0 0 1-5.031-1.373l-.361-.214-3.735.979.998-3.648-.235-.374A9.859 9.859 0 0 1 2.106 12C2.106 6.53 6.53 2.106 12 2.106S21.894 6.53 21.894 12 17.47 21.894 12 21.894z"/></svg>';
function ini(n){const p=(n||'').trim().split(' ').filter(Boolean);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(p[0]||'?').slice(0,2).toUpperCase();}
function alert48(v){if(!v.timestamp)return false;const ts=v.timestamp.seconds?v.timestamp.seconds*1000:new Date(v.timestamp).getTime();return(Date.now()-ts)>48*3600*1000&&!v.msg2Sent;}
function dias(v){if(!v.timestamp)return null;const ts=v.timestamp.seconds?v.timestamp.seconds*1000:new Date(v.timestamp).getTime();return Math.floor((Date.now()-ts)/(1000*3600*24));}
function m1(n){const fn=n.split(' ')[0];return `${fn}! Que alegria ter você com a gente hoje! 2026 é o ano de Romper os Limites, e sua presença aqui não foi por acaso. A Terra Fértil é sua casa. Conta com a gente sempre! 🌱`;}
function m2(n){const fn=n.split(' ')[0];return `${fn}, ainda pensando na sua presença com a gente no último culto. Foi lindo te ver por aqui! Toda terça às 20h e domingo às 19h tem culto na Terra Fértil. 2026 é tempo de Romper os Limites — você é sempre bem-vindo(a)! 🌱`;}

function buildCard(v){
  const i=ini(v.nome);
  const d=(v.celular||'').replace(/\D/g,'');
  const cel=d.length>=10;
  const al=alert48(v);
  const dy=dias(v);
  const l1=cel?`https://wa.me/55${d}?text=${encodeURIComponent(m1(v.nome))}`:'#';
  const l2=cel?`https://wa.me/55${d}?text=${encodeURIComponent(m2(v.nome))}`:'#';
  return `<div class="vcard">
    <div class="vcard-top">
      <div class="avatar">${i}</div>
      <div class="vcard-info">
        <div class="vcard-name">${v.nome||'—'}</div>
        ${v.celular?`<div class="vcard-row"><svg class="vi" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.24 16.92z"/></svg><span class="vcard-text">${v.celular}</span></div>`:''}
        ${v.endereco?`<div class="vcard-row"><svg class="vi" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span class="vcard-text">${v.endereco}</span></div>`:''}
        <div class="vcard-meta">
          <span class="tag ${v.primeiraVez?'primeira':'retorno'}">${v.primeiraVez?'1ª Visita':'Retorno'}</span>
          ${dy!==null?`<span class="tag dias">${dy===0?'hoje':dy===1?'1 dia':dy+' dias'}</span>`:''}
          ${al?'<span class="tag alert">⚠ 48h</span>':''}
        </div>
      </div>
    </div>
    <div class="notes-area">
      <button class="notes-toggle" onclick="this.nextElementSibling.classList.toggle('open')">▶ Anotações</button>
      <div class="notes-inner${v.notas?' open':''}">
        <textarea class="notes-ta" id="nt-${v.id}">${v.notas||''}</textarea>
        <button class="notes-save" onclick="salvarNota('${v.id}')">Salvar</button>
      </div>
    </div>
    <div class="wa-row">
      <a class="wa-btn ${v.msg1Sent?'sent':''} ${!cel?'no-cel':''}" href="${l1}" target="_blank" onclick="marcar('${v.id}','msg1Sent')">${WA} Boas-vindas${v.msg1Sent?'<span class="sent-badge">✓</span>':''}</a>
      <a class="wa-btn ${v.msg2Sent?'sent':''} ${!cel?'no-cel':''}" href="${l2}" target="_blank" onclick="marcar('${v.id}','msg2Sent')">${WA} Follow-up${v.msg2Sent?'<span class="sent-badge">✓</span>':''}</a>
    </div>
  </div>`;
}

window.salvarNota=async function(id){
  const val=document.getElementById('nt-'+id).value.trim();
  try{await updateDoc(doc(db,'visitantes',id),{notas:val});showToast('Nota salva!');}
  catch(e){showToast('Erro ao salvar.');}
};
window.marcar=async function(id,campo){
  try{const u={};u[campo]=true;await updateDoc(doc(db,'visitantes',id),u);const v=allVisitantes.find(x=>x.id===id);if(v)v[campo]=true;}
  catch(e){console.error(e);}
};
function tradErr(c){const e={'auth/invalid-credential':'E-mail ou senha incorretos.','auth/user-not-found':'Usuário não encontrado.','auth/wrong-password':'Senha incorreta.','auth/invalid-email':'E-mail inválido.','auth/too-many-requests':'Muitas tentativas.','auth/user-disabled':'Conta desativada.','auth/network-request-failed':'Sem conexão.'};return e[c]||'Erro. Tente novamente.';}
let tt;function showToast(m){clearTimeout(tt);const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');tt=setTimeout(()=>t.classList.remove('show'),3000);}
</script>

<!-- DRAWER -->
<div id="drw-ov" onclick="closeDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;backdrop-filter:blur(2px)"></div>
<div id="drw" style="position:fixed;right:0;top:0;bottom:0;width:min(280px,85vw);background:#0e0e0e;border-left:1px solid rgba(217,58,58,.2);z-index:9991;transform:translateX(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column">
  <div style="padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:#fff">DNA</span>
    <button onclick="closeDrawer()" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:24px;cursor:pointer;line-height:1;padding:4px">×</button>
  </div>
  <nav id="drw-nav" style="flex:1;padding:8px 0;overflow-y:auto"></nav>
  <div style="padding:16px;border-top:1px solid rgba(255,255,255,.08)">
    <button onclick="sair()" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:rgba(217,58,58,.1);border:1px solid rgba(217,58,58,.2);color:rgba(255,120,120,.85);font-family:Inter,sans-serif;font-size:13px;cursor:pointer;border-radius:6px"><span style="font-size:18px">🚪</span> Sair da conta</button>
  </div>
</div>

<script>
function openDrawer(){document.getElementById('drw').style.transform='translateX(0)';document.getElementById('drw-ov').style.display='block';}
function closeDrawer(){document.getElementById('drw').style.transform='translateX(100%)';document.getElementById('drw-ov').style.display='none';}
function buildDrawer(papel,active){
  const all=[
    {href:'index.html',icon:'🌱',label:'Cadastro',roles:['voluntario','lider','admin']},
    {href:'lider.html',icon:'👤',label:'Líder',roles:['lider','admin']},
    {href:'mapa.html',icon:'🗺️',label:'Mapa',roles:['lider','admin']},
    {href:'feed.html',icon:'📸',label:'Feed',roles:['voluntario','lider','admin']},
    {href:'admin.html',icon:'⚙️',label:'Admin',roles:['admin']},
  ];
  document.getElementById('drw-nav').innerHTML=all.filter(i=>i.roles.includes(papel)).map(i=>`<a href="${i.href}" style="display:flex;align-items:center;gap:14px;padding:14px 20px;color:${i.href===active?'#D93A3A':'rgba(255,255,255,.65)'};text-decoration:none;font-family:Inter,sans-serif;font-size:14px;font-weight:${i.href===active?600:400};border-left:3px solid ${i.href===active?'#D93A3A':'transparent'};background:${i.href===active?'rgba(217,58,58,.06)':'none'}"><span style="font-size:20px">${i.icon}</span> ${i.label}</a>`).join('');
}
</script>
