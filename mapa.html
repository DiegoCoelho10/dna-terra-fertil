<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DNA">

<title>Mapa · DNA Terra Fértil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--red:#8B1717;--rb:#D93A3A;
  --border:rgba(255,255,255,.08);--w:#fff;--dim:rgba(255,255,255,.55);--dimmer:rgba(255,255,255,.28);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}

#gate{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 42%,#1a0505 0%,var(--bg) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;padding:24px}
#gate.hidden{display:none}
.gate-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,88px);letter-spacing:.15em;color:var(--w);position:relative}
.gate-logo::after{content:'DNA';position:absolute;inset:0;color:var(--rb);filter:blur(24px);opacity:.2}
.gate-sub{font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:-6px}
.gate-label{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--dimmer);margin-top:8px}
.gate-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-bottom-color:rgba(255,255,255,.3);color:var(--w);font-family:'Inter',sans-serif;font-size:18px;padding:14px 20px;outline:none;width:min(260px,88vw);text-align:center;letter-spacing:.15em;border-radius:0;-webkit-appearance:none;transition:border-color .2s}
.gate-input:focus{border-bottom-color:var(--rb)}
.gate-btn{background:var(--red);color:var(--w);border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:15px 40px;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);transition:background .2s;min-height:50px}
.gate-btn:hover{background:#a01e1e}
.gate-err{color:rgba(255,120,120,.9);font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;min-height:18px}

#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

.header{background:rgba(8,8,8,.99);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;flex-shrink:0;padding-top:calc(var(--sat) + 11px);z-index:1000;position:relative}
.header-left{display:flex;align-items:center;gap:8px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:var(--w)}
.header-title{font-family:'Crimson Pro',serif;font-style:italic;font-size:13px;color:var(--dim)}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 11px;cursor:pointer;transition:all .2s;border-radius:2px;min-height:32px;-webkit-appearance:none;text-decoration:none;display:inline-flex;align-items:center}
.btn-sm:hover{background:rgba(255,255,255,.1);color:var(--w)}
.btn-sm.off{background:rgba(139,23,23,.3);border-color:var(--rb);color:var(--w)}

.legend{background:rgba(8,8,8,.97);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-dot.igreja{background:#FFD700;border:2px solid #fff}
.leg-dot.casa{background:#D93A3A;border:2px solid #fff}
.leg-dot.visitante{background:#fff;border:2px solid #888}
.leg-count{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--w);margin-left:2px}

#map{flex:1;width:100%}

/* loading */
#overlay{position:absolute;inset:0;background:rgba(8,8,8,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:10px;transition:opacity .4s}
#overlay.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:2px solid rgba(217,58,58,.3);border-top-color:var(--rb);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;color:var(--dim)}

/* PANEL */
#panel{position:fixed;left:0;right:0;bottom:0;height:60vh;max-height:500px;background:rgba(10,10,10,.98);border-top:2px solid var(--rb);border-radius:16px 16px 0 0;z-index:300;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
#panel.open{transform:translateY(0)}
.ph-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:10px auto 0;cursor:pointer}.ph{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:rgba(10,10,10,.98);z-index:1}
.ph-close{background:rgba(139,23,23,.3);border:1px solid rgba(217,58,58,.4);color:var(--w);cursor:pointer;font-size:18px;line-height:1;padding:8px 12px;border-radius:2px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ph-close:hover{color:var(--w)}
.ph-type{font-size:9px;letter-spacing:.35em;text-transform:uppercase;margin-bottom:4px}
.ph-type.igreja{color:#FFD700}
.ph-type.casa{color:var(--rb)}
.ph-type.visitante{color:rgba(255,255,255,.5)}
.ph-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:var(--w);line-height:1}
.pb{padding:14px}
.panel-close-bottom{position:sticky;bottom:0;width:100%;background:rgba(10,10,10,.98);border-top:1px solid var(--border);padding:10px 14px}
.panel-close-bottom button{width:100%;background:rgba(139,23,23,.3);border:1px solid rgba(217,58,58,.35);color:var(--w);font-family:"Inter",sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .2s;-webkit-appearance:none}
.panel-close-bottom button:hover{background:rgba(139,23,23,.5)}
.pr{display:flex;align-items:flex-start;gap:7px;margin-bottom:9px}
.pi{width:13px;height:13px;stroke:var(--dimmer);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:2px}
.pt{font-family:'Inter',sans-serif;font-size:12px;color:var(--dim);line-height:1.5}
.ptag{display:inline-block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:2px 9px;border-radius:20px;margin-bottom:10px}
.ptag.primeira{background:rgba(217,58,58,.15);color:var(--rb);border:1px solid rgba(217,58,58,.25)}
.ptag.retorno{background:rgba(76,175,80,.1);color:#4caf50;border:1px solid rgba(76,175,80,.2)}
.pdiv{border:none;border-top:1px solid var(--border);margin:12px 0}
.prox-title{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--rb);margin-bottom:7px}
.prox-item{background:rgba(139,23,23,.1);border:1px solid rgba(139,23,23,.2);padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:background .2s}
.prox-item:hover{background:rgba(139,23,23,.2)}
.prox-nome{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--w);margin-bottom:2px}
.prox-info{font-size:11px;color:var(--dim)}
.prox-dist{font-size:10px;color:var(--rb);font-weight:500;margin-top:2px}
.pbtn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;border:1px solid;font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:11px;text-decoration:none;transition:background .2s;margin-top:5px;cursor:pointer;-webkit-appearance:none;background:none}
.pbtn.wa{border-color:rgba(37,211,102,.3);color:#25d366}
.pbtn.wa:hover{background:rgba(37,211,102,.1)}
.pbtn.gm{border-color:rgba(66,133,244,.3);color:#4285f4}
.pbtn.gm:hover{background:rgba(66,133,244,.1)}
.pbtn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.vcount{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--rb);margin-top:5px}

#toast{position:fixed;bottom:calc(var(--sab) + 20px);left:50%;transform:translateX(-50%) translateY(80px);background:rgba(18,4,4,.97);border:1px solid rgba(217,58,58,.35);border-left:3px solid var(--rb);color:var(--w);font-family:'Crimson Pro',serif;font-size:14px;font-style:italic;padding:11px 18px;max-width:min(300px,88vw);text-align:center;z-index:9000;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Google Maps dark style overrides */
.gm-style .gm-style-iw-c{background:#111!important;color:#fff!important;border:1px solid rgba(217,58,58,.3)!important;box-shadow:none!important}
.gm-style .gm-style-iw-d{color:#fff!important}
.gm-style .gm-style-iw-tc::after{background:#111!important}
.bottom-nav-fixed{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.97);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-around;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:1001}
.nav-item-m{display:flex;flex-direction:column;align-items:center;gap:3px;color:rgba(255,255,255,.28);text-decoration:none;font-family:"Inter",sans-serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;cursor:pointer;border:none;background:none;transition:color .2s;min-width:52px;-webkit-appearance:none}
.nav-item-m.active{color:#D93A3A}
.nav-icon-m{font-size:18px;line-height:1}
</style>
</head>
<body>

<div id="gate" style="position:fixed;inset:0;background:#080808;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.15em;color:rgba(255,255,255,.3)">Verificando acesso...</div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">DNA</div>
      <div class="header-title">Mapa da Igreja</div>
    </div>
    <div class="header-right">
      <button class="btn-sm" id="btn-casas" onclick="toggleLayer('casas')">🏠 Casas</button>
      <button class="btn-sm" id="btn-visit" onclick="toggleLayer('visit')">👤 Visitantes</button>
      <button class="btn-sm" onclick="centerMap()">⌖ Centralizar</button>
      <a href="admin.html" class="btn-sm">← Admin</a>
    </div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot igreja"></div><span>Terra Fértil</span></div>
    <div class="leg-item"><div class="leg-dot casa"></div><span>Casas</span><span class="leg-count" id="lc">0</span></div>
    <div class="leg-item"><div class="leg-dot visitante"></div><span>Visitantes</span><span class="leg-count" id="lv">0</span></div>
  </div>
  <div style="position:relative;flex:1;display:flex;flex-direction:column">
    <div id="map"></div>
    <div id="overlay">
      <div class="spinner"></div>
      <div class="loading-txt" id="ltxt">Iniciando mapa...</div>
    </div>
  </div>
  <div id="panel">
    <div class="ph-handle" onclick="closePanel()"></div>
    <div class="ph">
      <div><div class="ph-type" id="pt"></div><div class="ph-name" id="pn">—</div></div>
      <button class="ph-close" onclick="closePanel()">×</button>
    </div>
    <div class="pb" id="pb"></div>
    <div class="panel-close-bottom"><button onclick="closePanel()">← Fechar</button></div>
  </div>
</div>
<div id="toast"></div>
<nav class="bottom-nav-fixed">
    <a href="index.html" class="nav-item-m"><span class="nav-icon-m">🌱</span>Voluntário</a>
    <a href="admin.html" class="nav-item-m"><span class="nav-icon-m">⚙️</span>Admin</a>
    <a href="lider.html" class="nav-item-m"><span class="nav-icon-m">🏠</span>Líder</a>
    <button class="nav-item-m active"><span class="nav-icon-m">🗺️</span>Mapa</button>
    <a href="feed.html" class="nav-item-m"><span class="nav-icon-m">📸</span>Feed</a>
  </nav>

<script>
const GMKEY = 'AIzaSyDZy05M7zUb-M4bIbKUi7KOM1BnRwyx8_M';
const IGREJA = { nome:'Terra Fértil', end:'Rua Augusto de Castro, 4, Inhoaíba, Rio de Janeiro, RJ', lat:-22.9087, lng:-43.6003 };

// Firebase config
const FB = {
  apiKey:"AIzaSyC46bONBdDeVbK4e7E_zIgveEokleOpKa4",
  authDomain:"dna-terra-fertil.firebaseapp.com",
  projectId:"dna-terra-fertil",
  storageBucket:"dna-terra-fertil.firebasestorage.app",
  messagingSenderId:"937958327076",
  appId:"1:937958327076:web:07a7ace0e689e08f0ae9b1"
};

let gmap, geocoder;
let allCasas=[], allVisitantes=[];
let casaMarkers=[], visitMarkers=[], casaCircles=[];
let showCasas=true, showVisit=true;
let geocodeCache={};
let db;

/* GATE — Firebase Auth */
async function initAuth() {
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const { getAuth, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  const authApp = initializeApp(FB, 'mapa-auth');
  const auth = getAuth(authApp);
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      loadFirebase();
    } else {
      // Não logado — redireciona para o index
      window.location.href = 'index.html';
    }
  });
}
initAuth();

/* FIREBASE + GOOGLE MAPS load */
async function loadFirebase() {
  setTxt('Carregando dados...');
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const { getFirestore, collection, getDocs, query, orderBy } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  db = getFirestore(initializeApp(FB));
  try {
    const [cs, vs] = await Promise.all([
      getDocs(query(collection(db,'casas'), orderBy('timestamp','asc'))),
      getDocs(query(collection(db,'visitantes'), orderBy('timestamp','desc')))
    ]);
    allCasas = cs.docs.map(d=>({id:d.id,...d.data()}));
    allVisitantes = vs.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) { showToast('Erro ao carregar dados.'); console.error(e); }
  loadGoogleMaps();
}

function loadGoogleMaps() {
  setTxt('Carregando mapa...');
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${GMKEY}&callback=initMap&language=pt-BR&region=BR`;
  s.async = true; s.defer = true;
  document.head.appendChild(s);
}

/* INIT MAP */
window.initMap = async function() {
  setTxt('Iniciando...');
  gmap = new google.maps.Map(document.getElementById('map'), {
    center: { lat: IGREJA.lat, lng: IGREJA.lng },
    zoom: 12,
    styles: darkMapStyle(),
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false
  });
  geocoder = new google.maps.Geocoder();
  // Igreja usa coordenadas fixas precisas — não geocodifica para evitar erro
  gmap.setCenter({lat:IGREJA.lat, lng:IGREJA.lng});
  plotIgreja();
  await plotAll();
  hideOverlay();
};

/* IGREJA PIN */
function plotIgreja() {
  const marker = new google.maps.Marker({
    position: { lat: IGREJA.lat, lng: IGREJA.lng },
    map: gmap,
    title: 'Terra Fértil',
    zIndex: 9999,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 0,
    },
    label: { text: '⛪', fontSize: '28px' }
  });

  // Gold pulsing circle
  new google.maps.Circle({
    map: gmap,
    center: { lat: IGREJA.lat, lng: IGREJA.lng },
    radius: 200,
    strokeColor: '#FFD700',
    strokeOpacity: 0.8,
    strokeWeight: 2,
    fillColor: '#FFD700',
    fillOpacity: 0.08
  });

  // Custom icon marker
  const igrejaMarker = new google.maps.Marker({
    position: { lat: IGREJA.lat, lng: IGREJA.lng },
    map: gmap,
    zIndex: 9999,
    icon: {
      url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="52" viewBox="0 0 44 52">
          <defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.4"/></filter></defs>
          <path d="M22 0 C10 0 0 10 0 22 C0 36 22 52 22 52 C22 52 44 36 44 22 C44 10 34 0 22 0Z" fill="#FFD700" filter="url(#s)"/>
          <circle cx="22" cy="21" r="12" fill="rgba(255,255,255,0.25)"/>
          <text x="22" y="27" font-size="14" text-anchor="middle" fill="white">⛪</text>
        </svg>`)}`,
      scaledSize: new google.maps.Size(44, 52),
      anchor: new google.maps.Point(22, 52)
    }
  });
  igrejaMarker.addListener('click', ()=> openIgrejaPanel());
}

/* GEOCODE via Google */
function geocodeAddress(address) {
  const key = address.toLowerCase().trim();
  if (geocodeCache[key]) return Promise.resolve(geocodeCache[key]);
  return new Promise(resolve => {
    const fullAddr = address.toLowerCase().includes('rio de janeiro') ? address : address + ', Rio de Janeiro, RJ, Brasil';
    geocoder.geocode({ address: fullAddr, region: 'BR', componentRestrictions: { country: 'BR' } }, (results, status) => {
      if (status === 'OK' && results[0]) {
        const loc = results[0].geometry.location;
        const coords = { lat: loc.lat(), lng: loc.lng() };
        geocodeCache[key] = coords;
        resolve(coords);
      } else {
        resolve(null);
      }
    });
  });
}

/* PLOT ALL */
async function plotAll(skipIgreja) {

  // CASAS
  setTxt('Localizando casas sacerdotais...');
  let cOk = 0;
  for (const casa of allCasas) {
    if (!casa.endereco) continue;
    const c = await geocodeAddress(casa.endereco);
    if (!c) continue;
    cOk++;
    geocodeCache[(casa.endereco||'').toLowerCase().trim()] = c;

    const marker = new google.maps.Marker({
      position: c, map: gmap, zIndex: 1000,
      icon: {
        url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
            <defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/></filter></defs>
            <path d="M18 0 C8 0 0 8 0 18 C0 30 18 44 18 44 C18 44 36 30 36 18 C36 8 28 0 18 0Z" fill="#D93A3A" filter="url(#s)"/>
            <circle cx="18" cy="17" r="9" fill="rgba(255,255,255,0.2)"/>
            <text x="18" y="22" font-size="11" text-anchor="middle" fill="white">🏠</text>
          </svg>`)}`,
        scaledSize: new google.maps.Size(36, 44),
        anchor: new google.maps.Point(18, 44)
      }
    });
    marker.addListener('click', () => {
      // Destroy all existing circles
      casaCircles.forEach(ci => { ci.setMap(null); });
      casaCircles.length = 0;
      // Create fresh circle only for this casa
      const activeCircle = new google.maps.Circle({
        map: gmap, center: c, radius: 1500,
        strokeColor: '#D93A3A', strokeOpacity: 0.5, strokeWeight: 1.5,
        fillColor: '#D93A3A', fillOpacity: 0.07
      });
      casaCircles.push(activeCircle);
      openCasaPanel(casa, c);
    });
    casaMarkers.push(marker);
    await delay(80);
  }
  document.getElementById('lc').textContent = cOk;

  // VISITANTES
  setTxt('Localizando visitantes...');
  const visitComEnd = allVisitantes.filter(v => v.endereco);
  let vOk = 0;
  for (const v of visitComEnd) {
    const c = await geocodeAddress(v.endereco);
    if (!c) continue;
    vOk++;
    geocodeCache[(v.endereco||'').toLowerCase().trim()] = c;

    const ini = initials(v.nome);
    const marker = new google.maps.Marker({
      position: c, map: gmap,
      icon: {
        url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">
            <circle cx="15" cy="15" r="13" fill="white" stroke="#666" stroke-width="2"/>
            <text x="15" y="20" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle" fill="#333">${ini}</text>
          </svg>`)}`,
        scaledSize: new google.maps.Size(30, 30),
        anchor: new google.maps.Point(15, 15)
      }
    });
    marker.addListener('click', () => openVisitantePanel(v, c));
    visitMarkers.push(marker);
    await delay(50);
  }
  document.getElementById('lv').textContent = vOk;

  // Fit bounds
  const bounds = new google.maps.LatLngBounds();
  bounds.extend({ lat: IGREJA.lat, lng: IGREJA.lng });
  casaMarkers.forEach(m => bounds.extend(m.getPosition()));
  visitMarkers.forEach(m => bounds.extend(m.getPosition()));
  if (!bounds.isEmpty()) gmap.fitBounds(bounds, 60);
}

/* NEAREST */
function getNearestCasas(fromCoords, limit) {
  const results = [];
  for (const casa of allCasas) {
    const key = (casa.endereco||'').toLowerCase().trim();
    const c = geocodeCache[key];
    if (!c) continue;
    const dist = haversine(fromCoords.lat, fromCoords.lng, c.lat, c.lng);
    results.push({ ...casa, distKm: dist.toFixed(1), lat: c.lat, lng: c.lng });
  }
  return results.sort((a,b) => parseFloat(a.distKm)-parseFloat(b.distKm)).slice(0,limit);
}

function countVisitantesNaArea(casaCoords) {
  return allVisitantes.filter(v => {
    const k = (v.endereco||'').toLowerCase().trim();
    const c = geocodeCache[k];
    if (!c) return false;
    return haversine(casaCoords.lat, casaCoords.lng, c.lat, c.lng) <= 2;
  }).length;
}

/* UTILS */
function haversine(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function initials(n) { const p=(n||'').trim().split(' ').filter(Boolean); return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(p[0]||'?').slice(0,2).toUpperCase(); }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }
function setTxt(t) { document.getElementById('ltxt').textContent=t; }
function hideOverlay() { document.getElementById('overlay').classList.add('hide'); }
let toastTimer;
function showToast(msg) { clearTimeout(toastTimer);const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),4000); }
