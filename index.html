<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DNA · Terra Fértil</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--r:#E53935;--dark:#080808;--card:#111;--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.85);--muted:rgba(255,255,255,.4)}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Inter',sans-serif}

/* LOGIN */
#s-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;gap:32px}
#s-login.show{display:flex}
.l-dna{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:.1em;color:#fff;line-height:1}
.l-div{width:40px;height:2px;background:var(--r)}
.l-sub{font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
.l-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;align-items:center}
.l-title{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.btn-g{display:flex;align-items:center;gap:12px;background:#fff;color:#333;border:none;border-radius:10px;padding:14px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:.2s;font-family:'Inter',sans-serif}
.btn-g:hover{background:#f0f0f0}
.btn-g svg{width:20px;height:20px;flex-shrink:0}
.l-err{font-size:12px;color:#ef5350;text-align:center;min-height:16px}

/* PENDENTE */
#s-pend{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;gap:20px;text-align:center}
.p-icon{font-size:56px}.p-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.1em}
.p-msg{font-size:14px;color:var(--muted);max-width:280px;line-height:1.6}
.btn-sair{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:10px 24px;border-radius:8px;cursor:pointer;margin-top:8px;transition:.2s}
.btn-sair:hover{border-color:var(--r);color:var(--r)}

/* APP */
#s-app{display:none;padding:24px 16px 40px}
.pt{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;color:#fff;margin-bottom:4px}
.ps{font-size:12px;color:var(--muted);margin-bottom:24px}
.fc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:16px}
.fl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.fi,.fs{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;width:100%;transition:.2s;outline:none}
.fi:focus,.fs:focus{border-color:var(--r)}.fs option{background:#1a1a1a}
.btn-s{background:var(--r);border:none;border-radius:10px;padding:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;width:100%}
.btn-s:hover{background:#C62828}.btn-s:disabled{opacity:.5;cursor:not-allowed}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--r);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL DE SUCESSO */
#success-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;
  z-index:500;padding:24px;
  backdrop-filter:blur(4px);
}
#success-overlay.show{display:flex}
#success-box{
  background:#111;
  border:1px solid rgba(76,175,80,.3);
  border-radius:20px;
  padding:36px 28px;
  width:100%;max-width:340px;
  text-align:center;
  animation:popIn .4s cubic-bezier(.16,1,.3,1);
  position:relative;
}
@keyframes popIn{
  from{opacity:0;transform:scale(.85) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.success-icon{
  width:72px;height:72px;
  background:rgba(76,175,80,.15);
  border:2px solid rgba(76,175,80,.4);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;
  margin:0 auto 20px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.3)}
  50%{box-shadow:0 0 0 12px rgba(76,175,80,0)}
}
.success-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;letter-spacing:.08em;
  color:#fff;margin-bottom:8px;
}
.success-name{
  color:#4caf50;font-size:20px;
  font-weight:600;margin-bottom:10px;
}
.success-msg{
  font-size:13px;color:var(--muted);
  line-height:1.6;margin-bottom:24px;
}
.success-detail{
  background:rgba(76,175,80,.08);
  border:1px solid rgba(76,175,80,.15);
  border-radius:10px;padding:10px 14px;
  font-size:12px;color:rgba(255,255,255,.5);
  margin-bottom:24px;text-align:left;
  display:flex;flex-direction:column;gap:4px;
}
.success-detail span{display:flex;align-items:center;gap:6px}
.btn-ok{
  background:rgba(76,175,80,.2);
  border:1px solid rgba(76,175,80,.4);
  color:#4caf50;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:14px;border-radius:10px;
  cursor:pointer;width:100%;transition:.2s;
}
.btn-ok:hover{background:rgba(76,175,80,.3);color:#fff}
.btn-novo{
  background:var(--r);border:none;
  color:#fff;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:14px;border-radius:10px;
  cursor:pointer;width:100%;transition:.2s;
  margin-top:8px;
}
.btn-novo:hover{background:#C62828}
</style>
</head>
<body>

<div id="loading"><div class="sp"></div></div>

<!-- LOGIN -->
<div id="s-login">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="l-dna">DNA</div>
    <div class="l-div"></div>
    <div class="l-sub">Terra Fértil · Acolhimento</div>
  </div>
  <div class="l-card">
    <div class="l-title">Acesse com sua conta Google</div>
    <button class="btn-g" id="btn-google">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <div class="l-err" id="l-err"></div>
  </div>
</div>

<!-- PENDENTE -->
<div id="s-pend">
  <div class="p-icon">⏳</div>
  <div class="p-title">Aguardando Aprovação</div>
  <div class="p-msg">Seu cadastro foi recebido. Um administrador irá liberar seu acesso em breve.</div>
  <button class="btn-sair" id="btn-sair">Sair da conta</button>
</div>

<!-- FORMULÁRIO -->
<div id="s-app">
  <div class="pt">Cadastro de Visitante</div>
  <div class="ps" id="u-info"></div>
  <div class="fc">
    <div><label class="fl">Nome Completo *</label><input class="fi" id="f-nome" type="text" placeholder="Nome completo do visitante" autocapitalize="words"/></div>
    <div><label class="fl">Celular</label><input class="fi" id="f-cel" type="tel" placeholder="(21) 99999-0000" inputmode="numeric"/></div>
    <div><label class="fl">Endereço Residencial</label><input class="fi" id="f-end" type="text" placeholder="Rua, número, bairro" autocapitalize="words"/></div>
    <div><label class="fl">Como conheceu a Terra Fértil?</label>
      <select class="fs" id="f-origem">
        <option value="">Selecione...</option>
        <option>Indicação de amigo</option>
        <option>Redes sociais</option>
        <option>Família</option>
        <option>Evento</option>
        <option>Outro</option>
      </select>
    </div>
    <div><label class="fl">Primeira vez na igreja?</label>
      <select class="fs" id="f-primeira">
        <option value="">Selecione...</option>
        <option value="sim">Sim, primeira vez</option>
        <option value="nao">Não, já vim antes</option>
      </select>
    </div>
    <button class="btn-s" id="btn-salvar">🌱 Registrar Visitante</button>
  </div>
</div>

<!-- MODAL DE SUCESSO -->
<div id="success-overlay">
  <div id="success-box">
    <div class="success-icon">🌱</div>
    <div class="success-title">Bem-vindo(a)!</div>
    <div class="success-name" id="sc-nome"></div>
    <div class="success-msg">Cadastro realizado com sucesso! Que alegria ter essa pessoa com a gente hoje na Terra Fértil. 🙌</div>
    <div class="success-detail">
      <span>📅 <span id="sc-data"></span></span>
      <span>🕐 <span id="sc-hora"></span></span>
      <span id="sc-tipo-wrap">🌟 <span id="sc-tipo"></span></span>
    </div>
    <button class="btn-ok" id="btn-ok">✓ Fechar</button>
    <button class="btn-novo" id="btn-novo">+ Cadastrar outro visitante</button>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc,addDoc,collection,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyC46bONBdDeVbK4e7E_zIgveEokleOpKa4",authDomain:"dna-terra-fertil.firebaseapp.com",projectId:"dna-terra-fertil",storageBucket:"dna-terra-fertil.firebasestorage.app",messagingSenderId:"937958327076",appId:"1:937958327076:web:07a7ace0e689e08f0ae9b1"};
const BOOT=['dsdiegocoelho@gmail.com'];

const app=initializeApp(FB),auth=getAuth(app),db=getFirestore(app);
const $=id=>document.getElementById(id);
const show=(id,d='flex')=>{const el=$(id);if(el)el.style.display=d};
const hide=id=>{const el=$(id);if(el)el.style.display='none'};

function limparForm(){
  ['f-nome','f-cel','f-end'].forEach(id=>$(id).value='');
  $('f-origem').value='';$('f-primeira').value='';
}

function fecharModal(){
  $('success-overlay').classList.remove('show');
}

$('btn-ok').onclick=fecharModal;
$('btn-novo').onclick=()=>{fecharModal();$('f-nome').focus();};
$('success-overlay').onclick=(e)=>{if(e.target===$('success-overlay'))fecharModal();};

$('btn-google').onclick=async()=>{
  try{await signInWithPopup(auth,new GoogleAuthProvider());}
  catch(e){$('l-err').textContent='Erro ao entrar. Tente novamente.';}
};
$('btn-sair').onclick=()=>signOut(auth);

onAuthStateChanged(auth,async user=>{
  hide('loading');
  if(!user){$('s-login').classList.add('show');hide('s-app');hide('s-pend');return;}

  const ref=doc(db,'usuarios',user.uid);
  let snap=await getDoc(ref);

  if(!snap.exists()){
    const isB=BOOT.includes((user.email||'').toLowerCase());
    await setDoc(ref,{uid:user.uid,email:user.email,nome:user.displayName||user.email.split('@')[0],foto:user.photoURL||'',papel:isB?'admin':'voluntario',status:isB?'aprovado':'pendente',criadoEm:serverTimestamp()});
    snap=await getDoc(ref);
  }

  const isB=BOOT.includes((user.email||'').toLowerCase());
  if(isB&&(snap.data().papel!=='admin'||snap.data().status!=='aprovado')){
    await setDoc(ref,{papel:'admin',status:'aprovado'},{merge:true});
    snap=await getDoc(ref);
  }

  const d=snap.data();
  if(d.status==='pendente'){hide('s-login');hide('s-app');show('s-pend');return;}
  if(d.status==='rejeitado'){
    await signOut(auth);
    $('l-err').textContent='Acesso negado pelo administrador.';
    $('s-login').classList.add('show');
    hide('s-app');hide('s-pend');return;
  }

  $('s-login').classList.remove('show');
  hide('s-pend');
  show('s-app','block');
  $('u-info').textContent=`Olá, ${d.nome} 👋`;
});

$('btn-salvar').onclick=async()=>{
  const nome=$('f-nome').value.trim();
  if(!nome){
    $('f-nome').style.borderColor='#ef5350';
    $('f-nome').placeholder='⚠ Preencha o nome!';
    setTimeout(()=>{$('f-nome').style.borderColor='';$('f-nome').placeholder='Nome completo do visitante';},2000);
    return;
  }

  const btn=$('btn-salvar');
  btn.disabled=true;btn.textContent='Salvando...';

  try{
    const agora=new Date();
    const dataFormatada=agora.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
    const horaFormatada=agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const primeiraVez=$('f-primeira').value==='sim';

    await addDoc(collection(db,'visitantes'),{
      nome,
      celular:$('f-cel').value.trim()||null,
      endereco:$('f-end').value.trim()||null,
      origem:$('f-origem').value||null,
      primeiraVez,
      culto:dataFormatada,
      horario:horaFormatada,
      cadastradoPor:auth.currentUser?.email||'',
      timestamp:serverTimestamp(),
      criadoEm:serverTimestamp()
    });

    // Vibração de sucesso
    if(navigator.vibrate)navigator.vibrate([100,50,200,50,100]);

    // Preenche o modal
    $('sc-nome').textContent=nome;
    $('sc-data').textContent=dataFormatada.charAt(0).toUpperCase()+dataFormatada.slice(1);
    $('sc-hora').textContent=horaFormatada;
    $('sc-tipo').textContent=primeiraVez?'Primeira visita na Terra Fértil! 🎉':'Retorno — que alegria! 🙌';

    // Mostra modal
    $('success-overlay').classList.add('show');

    // Limpa form
    limparForm();

  }catch(e){
    alert('Erro ao salvar. Verifique sua conexão e tente novamente.');
    console.error(e);
  }finally{
    btn.disabled=false;btn.textContent='🌱 Registrar Visitante';
  }
};
</script>
</body>
</html>
