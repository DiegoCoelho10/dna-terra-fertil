<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DNA · Terra Fértil</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--r:#E53935;--dark:#080808;--card:#111;--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.85);--muted:rgba(255,255,255,.4)}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Inter',sans-serif}
#dna-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0e0e0e;border-top:1px solid var(--border);z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
#dna-nav.show{display:flex;justify-content:space-around}
.dna-ni{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);text-decoration:none;font-size:10px;font-weight:500;letter-spacing:.05em;padding:4px 12px;transition:.2s}
.dna-ni span:first-child{font-size:20px}.dna-ni.on,.dna-ni:hover{color:var(--r)}
#s-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;gap:32px}
.l-dna{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:.1em;color:#fff;line-height:1}
.l-div{width:40px;height:2px;background:var(--r)}
.l-sub{font-size:11px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
.l-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:16px;align-items:center}
.l-title{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.btn-g{display:flex;align-items:center;gap:12px;background:#fff;color:#333;border:none;border-radius:10px;padding:14px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:.2s;font-family:'Inter',sans-serif}
.btn-g:hover{background:#f0f0f0;transform:translateY(-1px)}
.btn-g svg{width:20px;height:20px;flex-shrink:0}
.l-err{font-size:12px;color:#ef5350;text-align:center;min-height:16px}
#s-pend{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;gap:20px;text-align:center}
.p-icon{font-size:56px}.p-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.1em}
.p-msg{font-size:14px;color:var(--muted);max-width:280px;line-height:1.6}
.btn-sair{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:10px 24px;border-radius:8px;cursor:pointer;margin-top:8px;transition:.2s}
.btn-sair:hover{border-color:var(--r);color:var(--r)}
#s-app{display:none;padding:24px 16px 100px}
.pt{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;color:#fff;margin-bottom:4px}
.ps{font-size:12px;color:var(--muted);margin-bottom:24px}
.fc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:16px}
.fl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.fi,.fs{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;width:100%;transition:.2s;outline:none}
.fi:focus,.fs:focus{border-color:var(--r)}.fs option{background:#1a1a1a}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-s{background:var(--r);border:none;border-radius:10px;padding:14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;width:100%}
.btn-s:hover{background:#C62828;transform:translateY(-1px)}.btn-s:disabled{opacity:.5;cursor:not-allowed;transform:none}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#loading{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--r);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="sp"></div></div>
<nav id="dna-nav"></nav>
<div id="s-login">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="l-dna">DNA</div><div class="l-div"></div>
    <div class="l-sub">Terra Fértil · Acolhimento</div>
  </div>
  <div class="l-card">
    <div class="l-title">Acesse com sua conta Google</div>
    <button class="btn-g" id="btn-google">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar com Google
    </button>
    <div class="l-err" id="l-err"></div>
  </div>
</div>
<div id="s-pend">
  <div class="p-icon">⏳</div>
  <div class="p-title">Aguardando Aprovação</div>
  <div class="p-msg">Seu cadastro foi recebido. Um administrador irá liberar seu acesso em breve.</div>
  <button class="btn-sair" id="btn-sair">Sair da conta</button>
</div>
<div id="s-app">
  <div class="pt">Cadastro de Visitante</div>
  <div class="ps" id="u-info"></div>
  <div class="fc">
    <div><label class="fl">Nome Completo *</label><input class="fi" id="f-nome" type="text" placeholder="Nome completo do visitante"/></div>
    <div class="fg">
      <div><label class="fl">Telefone</label><input class="fi" id="f-tel" type="tel" placeholder="(21) 99999-0000"/></div>
      <div><label class="fl">Idade</label><input class="fi" id="f-idade" type="number" placeholder="Ex: 25"/></div>
    </div>
    <div><label class="fl">Como conheceu a Terra Fértil?</label>
      <select class="fs" id="f-origem"><option value="">Selecione...</option><option>Indicação de amigo</option><option>Redes sociais</option><option>Família</option><option>Evento</option><option>Outro</option></select></div>
    <div><label class="fl">Primeira vez na igreja?</label>
      <select class="fs" id="f-primeira"><option value="">Selecione...</option><option value="sim">Sim, primeira vez</option><option value="nao">Não, já vim antes</option></select></div>
    <div><label class="fl">Observações</label><input class="fi" id="f-obs" type="text" placeholder="Informações adicionais..."/></div>
    <button class="btn-s" id="btn-salvar">Registrar Visitante</button>
  </div>
</div>
<div id="toast"></div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithPopup,GoogleAuthProvider,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc,addDoc,collection,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const FB={apiKey:"AIzaSyC46bONBdDeVbK4e7E_zIgveEokleOpKa4",authDomain:"dna-terra-fertil.firebaseapp.com",projectId:"dna-terra-fertil",storageBucket:"dna-terra-fertil.firebasestorage.app",messagingSenderId:"937958327076",appId:"1:937958327076:web:07a7ace0e689e08f0ae9b1"};
const BOOT=['dsdiegocoelho@gmail.com'];
const NAV=[['index.html','🌱','Cadastro',['voluntario','lider','admin']],['lider.html','🏠','Líder',['lider','admin']],['mapa.html','🗺️','Mapa',['lider','admin']],['feed.html','📸','Feed',['voluntario','lider','admin']],['admin.html','⚙️','Admin',['admin']]];
const app=initializeApp(FB),auth=getAuth(app),db=getFirestore(app);
const $=id=>document.getElementById(id);
const show=(id,d='flex')=>{$(id).style.display=d};
const hide=id=>{$(id).style.display='none'};
function toast(m,ok=true){const t=$('toast');t.textContent=m;t.style.borderColor=ok?'#4caf50':'#ef5350';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function buildNav(p){const n=$('dna-nav');n.innerHTML=NAV.filter(x=>x[3].includes(p)).map(x=>`<a href="${x[0]}" class="dna-ni${x[0]==='index.html'?' on':''}"><span>${x[1]}</span><span>${x[2]}</span></a>`).join('');n.classList.add('show');}
$('btn-google').onclick=async()=>{try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){$('l-err').textContent='Erro ao entrar. Tente novamente.';}};
$('btn-sair').onclick=()=>signOut(auth);
onAuthStateChanged(auth,async user=>{
  hide('loading');
  if(!user){show('s-login');hide('s-app');hide('s-pend');return;}
  const ref=doc(db,'usuarios',user.uid);
  let snap=await getDoc(ref);
  if(!snap.exists()){
    const isB=BOOT.includes(user.email);
    await setDoc(ref,{uid:user.uid,email:user.email,nome:user.displayName||user.email.split('@')[0],foto:user.photoURL||'',papel:isB?'admin':'voluntario',status:isB?'aprovado':'pendente',criadoEm:serverTimestamp()});
    snap=await getDoc(ref);
  }
  const d=snap.data();
  if(d.status==='pendente'){hide('s-login');hide('s-app');show('s-pend');return;}
  if(d.status==='rejeitado'){await signOut(auth);$('l-err').textContent='Acesso negado pelo administrador.';show('s-login');hide('s-app');hide('s-pend');return;}
  const p=d.papel||'voluntario';
  if(p==='lider'){window.location.href='lider.html';return;}
  if(p==='admin'){window.location.href='admin.html';return;}
  hide('s-login');hide('s-pend');show('s-app','block');buildNav(p);
  $('u-info').textContent=`Olá, ${d.nome}`;
});
$('btn-salvar').onclick=async()=>{
  const nome=$('f-nome').value.trim();
  if(!nome){toast('Preencha o nome do visitante',false);return;}
  const btn=$('btn-salvar');btn.disabled=true;btn.textContent='Salvando...';
  try{
    await addDoc(collection(db,'visitantes'),{nome,telefone:$('f-tel').value.trim(),idade:$('f-idade').value||null,origem:$('f-origem').value,primeira:$('f-primeira').value,obs:$('f-obs').value.trim(),cadastradoPor:auth.currentUser?.email||'',criadoEm:serverTimestamp()});
    toast('Visitante registrado! 🌱');
    ['f-nome','f-tel','f-idade','f-obs'].forEach(id=>$(id).value='');
    $('f-origem').value='';$('f-primeira').value='';
  }catch(e){toast('Erro ao salvar.',false);}
  finally{btn.disabled=false;btn.textContent='Registrar Visitante';}
};
</script>
</body>
</html>
