<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Admin · DNA Terra Fértil</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--card:#111;--red:#8B1717;--rb:#D93A3A;
  --border:rgba(255,255,255,.08);--w:#fff;--dim:rgba(255,255,255,.55);--dimmer:rgba(255,255,255,.28);
  --green-l:#4caf50;--amber:#f59e0b;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{min-height:100%;background:var(--bg);color:var(--w);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* GATE */
#gate{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 42%,#1a0505 0%,var(--bg) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;padding:24px}
#gate.hidden{display:none}
.gate-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,15vw,96px);letter-spacing:.15em;color:var(--w);position:relative}
.gate-logo::after{content:'DNA';position:absolute;inset:0;color:var(--rb);filter:blur(28px);opacity:.2}
.gate-sub{font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-top:-8px}
.gate-label{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--dimmer);margin-top:8px}
.gate-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-bottom-color:rgba(255,255,255,.3);color:var(--w);font-family:'Inter',sans-serif;font-size:18px;padding:14px 20px;outline:none;width:min(280px,90vw);text-align:center;letter-spacing:.15em;border-radius:0;-webkit-appearance:none;transition:border-color .2s}
.gate-input:focus{border-bottom-color:var(--rb)}
.gate-btn{background:var(--red);color:var(--w);border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:16px 40px;cursor:pointer;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);transition:background .2s;margin-top:4px;min-height:52px}
.gate-btn:hover{background:#a01e1e}
.gate-err{color:rgba(255,120,120,.9);font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;min-height:20px}

/* APP */
#app{display:none;min-height:100vh;padding-bottom:calc(var(--sab) + 20px)}
#app.visible{display:block}

/* HEADER */
.header{background:rgba(8,8,8,.97);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header-left{display:flex;align-items:center;gap:8px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.12em;color:var(--w)}
.fb-dot{width:7px;height:7px;border-radius:50%;background:#f44336;flex-shrink:0}
.fb-dot.ok{background:#4caf50}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn-sm{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all .2s;border-radius:2px;min-height:34px;text-decoration:none;display:inline-flex;align-items:center;-webkit-appearance:none}
.btn-sm:hover{background:rgba(255,255,255,.1);color:var(--w)}
.btn-logout{background:none;border:none;color:var(--dimmer);font-family:'Inter',sans-serif;font-size:10px;cursor:pointer;padding:7px;min-height:34px}
.btn-logout:hover{color:var(--w)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(8,8,8,.8);position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:12px 8px;text-align:center;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;-webkit-appearance:none;background:none;border-top:none;border-left:none;border-right:none;min-height:42px}
.tab.active{color:var(--w);border-bottom-color:var(--rb)}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}@media(min-width:500px){.stats-bar{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--bg);padding:12px 10px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5vw,34px);letter-spacing:.05em;color:var(--w);line-height:1}
.stat-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dimmer);margin-top:3px}
.stat-val.red{color:var(--rb)}.stat-val.green{color:var(--green-l)}.stat-val.amber{color:var(--amber)}

/* SEARCH + FILTERS */
.search-bar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.search-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--w);font-family:'Inter',sans-serif;font-size:14px;padding:9px 14px;outline:none;border-radius:2px;-webkit-appearance:none;min-height:38px}
.search-input:focus{border-color:rgba(217,58,58,.4)}
.search-input::placeholder{color:rgba(255,255,255,.2)}
.btn-export{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);color:var(--green-l);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:9px 14px;cursor:pointer;border-radius:2px;white-space:nowrap;min-height:38px;transition:background .2s}
.btn-export:hover{background:rgba(76,175,80,.2)}
.filters{padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.filter-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dimmer)}
.filter-input{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--w);font-family:'Inter',sans-serif;font-size:13px;padding:6px 10px;outline:none;border-radius:2px;-webkit-appearance:none;min-height:34px}
.filter-input:focus{border-color:rgba(217,58,58,.4)}
.filter-tag{display:flex;gap:5px;flex-wrap:wrap}
.ftag{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);font-size:10px;padding:5px 10px;cursor:pointer;border-radius:2px;transition:all .2s;-webkit-appearance:none;min-height:32px}
.ftag.active{background:rgba(139,23,23,.3);border-color:var(--rb);color:var(--w)}
.filter-clear{background:none;border:1px solid var(--border);color:var(--dimmer);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;cursor:pointer;border-radius:2px;transition:all .2s;min-height:32px}
.filter-clear:hover{border-color:var(--rb);color:var(--w)}

/* CONTENT */
.content{padding:16px;max-width:900px;margin:0 auto}
.day-group{margin-bottom:20px}
.day-header{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.08em;color:var(--dim);padding:7px 0 9px;border-bottom:1px solid var(--border);margin-bottom:9px;display:flex;align-items:baseline;gap:10px}
.day-count{font-family:'Inter',sans-serif;font-size:10px;font-weight:500;background:rgba(139,23,23,.25);color:var(--rb);padding:2px 9px;border-radius:20px}

/* VISITOR CARD */
.visitor-card{background:var(--card);border:1px solid var(--border);margin-bottom:9px;overflow:hidden;transition:border-color .2s;position:relative;user-select:none;-webkit-user-select:none}
.visitor-card:hover{border-color:rgba(139,23,23,.3)}
.visitor-card.pressing{border-color:rgba(217,58,58,.5);opacity:.85}
.press-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--rb);width:0}
.card-top{display:flex;align-items:flex-start;gap:12px;padding:14px}
.avatar{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.05em;color:var(--w);flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-family:'Inter',sans-serif;font-size:clamp(14px,3.5vw,16px);font-weight:600;color:var(--w);margin-bottom:4px;word-break:break-word}
.card-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.card-icon{width:12px;height:12px;stroke:var(--dimmer);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card-text{font-family:'Inter',sans-serif;font-size:12px;color:var(--dim)}
.card-meta{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:20px;font-weight:500}
.tag.primeira{background:rgba(217,58,58,.15);color:var(--rb);border:1px solid rgba(217,58,58,.25)}
.tag.retorno{background:rgba(76,175,80,.1);color:var(--green-l);border:1px solid rgba(76,175,80,.2)}
.tag.hora{background:rgba(255,255,255,.05);color:var(--dimmer);border:1px solid var(--border)}
.tag.alert48{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.tag.dias{background:rgba(255,255,255,.05);color:var(--dimmer);border:1px solid var(--border);font-size:9px}

/* CASAS SUGERIDAS */
.casas-sugeridas{padding:6px 14px 10px;border-top:1px solid var(--border);display:none}
.casas-sugeridas.show{display:block}
.casas-label{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--rb);margin-bottom:6px}
.casa-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(139,23,23,.1);border:1px solid rgba(139,23,23,.2);padding:4px 9px;border-radius:20px;margin:2px 3px 2px 0;font-size:11px;color:var(--dim)}
.casa-pill strong{color:var(--w);font-weight:600}

/* ANNOTATIONS */
.card-notes{border-top:1px solid var(--border);padding:0}
.notes-toggle{width:100%;background:none;border:none;color:var(--dimmer);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.25em;text-transform:uppercase;padding:10px 14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;transition:color .2s;-webkit-appearance:none}
.notes-toggle:hover{color:var(--w)}
.notes-toggle .arrow{transition:transform .2s;font-size:8px}
.notes-toggle.open .arrow{transform:rotate(90deg)}
.notes-inner{display:none;padding:0 14px 12px}
.notes-inner.open{display:block}
.notes-label{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dimmer);margin-bottom:6px}
.notes-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--w);font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;padding:9px 12px;outline:none;resize:none;border-radius:2px;min-height:60px;transition:border-color .2s;-webkit-appearance:none}
.notes-ta:focus{border-color:rgba(217,58,58,.35)}
.notes-ta::placeholder{color:rgba(255,255,255,.18)}
.notes-save{background:rgba(139,23,23,.25);border:1px solid rgba(217,58,58,.3);color:var(--rb);font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 14px;cursor:pointer;transition:all .2s;margin-top:6px;border-radius:2px}
.notes-save:hover{background:rgba(139,23,23,.4);color:var(--w)}
.notes-saved{font-size:11px;color:var(--green-l);font-family:'Crimson Pro',serif;font-style:italic;margin-top:5px;display:none}

/* WA ACTIONS */
.card-actions{border-top:1px solid var(--border);display:flex}
.wa-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 6px;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:background .2s;text-decoration:none;color:var(--dim);position:relative}
.wa-btn:not(:last-child){border-right:1px solid var(--border)}
.wa-btn:hover{background:rgba(255,255,255,.05);color:var(--w)}
.wa-btn .wa-icon{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.wa-btn.msg1:hover,.wa-btn.msg2:hover{background:rgba(37,211,102,.07);color:#25d366}
.wa-btn.no-cel{opacity:.3;cursor:not-allowed;pointer-events:none}
.wa-btn.sent{color:var(--green-l);opacity:.9}
.wa-btn.sent:hover{background:rgba(76,175,80,.07);color:var(--green-l)}
.sent-badge{font-size:9px;letter-spacing:.05em;color:var(--green-l);background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);padding:1px 5px;border-radius:10px;position:absolute;top:4px;right:5px}

/* PREV/NEXT NAV */


/* EMPTY / LOADING */
.empty-state{text-align:center;padding:50px 20px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.3}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.08em;color:var(--dim);margin-bottom:6px}
.empty-text{font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;color:var(--dimmer)}
.loading-bar{height:2px;background:var(--border);position:relative;overflow:hidden}
.loading-bar::after{content:'';position:absolute;inset:0;background:var(--rb);animation:load-slide 1.2s ease-in-out infinite}
@keyframes load-slide{0%{transform:scaleX(0) translateX(0)}50%{transform:scaleX(.7) translateX(40%)}100%{transform:scaleX(0) translateX(300%)}}}

/* CASAS TAB */
#tab-casas{display:none;padding:16px;max-width:900px;margin:0 auto}
#tab-casas.active{display:block}
.casas-form{background:var(--card);border:1px solid var(--border);padding:18px;margin-bottom:20px}
.casas-form-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.08em;color:var(--w);margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.c-label{display:block;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dimmer);margin-bottom:6px}
.c-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-bottom-color:rgba(255,255,255,.22);color:var(--w);font-family:'Inter',sans-serif;font-size:14px;padding:11px 13px;outline:none;transition:border-color .2s;border-radius:0;-webkit-appearance:none;min-height:44px}
.c-input:focus{border-bottom-color:var(--rb)}
.c-input::placeholder{color:rgba(255,255,255,.18)}
.btn-add{background:var(--red);color:var(--w);border:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:13px 26px;cursor:pointer;transition:background .2s;min-height:46px;margin-top:12px;-webkit-appearance:none}
.btn-add:hover{background:#a01e1e}
.btn-add:disabled{opacity:.5;cursor:not-allowed}
.casas-list-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.08em;color:var(--dim);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.casa-card{background:var(--card);border:1px solid var(--border);padding:14px;margin-bottom:9px;display:flex;align-items:flex-start;gap:12px;position:relative;user-select:none;-webkit-user-select:none;transition:border-color .2s}
.casa-card:hover{border-color:rgba(139,23,23,.3)}
.casa-card.pressing{border-color:rgba(217,58,58,.5);opacity:.85}
.casa-num{width:34px;height:34px;min-width:34px;border-radius:50%;background:rgba(139,23,23,.2);border:1px solid rgba(217,58,58,.25);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--rb);flex-shrink:0}
.casa-info{flex:1;min-width:0}
.casa-nome{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--w);margin-bottom:3px}
.casa-lider{font-family:'Inter',sans-serif;font-size:12px;color:var(--dim);margin-bottom:2px}
.casa-end{font-family:'Inter',sans-serif;font-size:11px;color:var(--dimmer)}
.casa-count{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--rb);margin-top:4px}

/* CONFIRM MODAL */
#confirm-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9998;padding:20px}
#confirm-modal.show{display:flex}
.modal-box{background:#141414;border:1px solid rgba(217,58,58,.3);padding:26px 22px;max-width:min(340px,90vw);width:100%}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:.06em;color:var(--w);text-align:center;margin-bottom:8px}
.modal-desc{font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;color:var(--dim);text-align:center;margin-bottom:20px;line-height:1.6}
.modal-name{color:var(--rb);font-weight:600;font-style:normal}
.modal-actions{display:flex;gap:8px}
.modal-cancel{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--dim);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;padding:13px;cursor:pointer;transition:all .2s;-webkit-appearance:none}
.modal-cancel:hover{background:rgba(255,255,255,.1);color:var(--w)}
.modal-confirm{flex:1;background:rgba(139,23,23,.8);border:1px solid var(--rb);color:var(--w);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:13px;cursor:pointer;transition:all .2s;-webkit-appearance:none}
.modal-confirm:hover{background:var(--rb)}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc, deleteDoc, updateDoc, doc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyC46bONBdDeVbK4e7E_zIgveEokleOpKa4",
  authDomain:"dna-terra-fertil.firebaseapp.com",
  projectId:"dna-terra-fertil",
  storageBucket:"dna-terra-fertil.firebasestorage.app",
  messagingSenderId:"937958327076",
  appId:"1:937958327076:web:07a7ace0e689e08f0ae9b1"
}));

const SENHA = 'dna2025';
let allVisitors=[], allCasas=[], filteredVisitors=[], tagFilter='all', currentTab='visitantes';

/* ── GATE com sessionStorage ── */
window.checkPassword = function() {
  const val = document.getElementById('gate-input').value;
  if (val === SENHA) {
    sessionStorage.setItem('dna_auth','1');
    openApp();
  } else {
    document.getElementById('gate-err').textContent='Senha incorreta.';
    document.getElementById('gate-input').value='';
    document.getElementById('gate-input').focus();
  }
};
function openApp() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  setTimeout(()=>document.getElementById('fb-dot').classList.add('ok'),600);
  loadAll();
}
window.logout = function() {
  sessionStorage.removeItem('dna_auth');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('gate').classList.remove('hidden');
  document.getElementById('gate-input').value='';
  document.getElementById('gate-err').textContent='';
};
// auto-login se já autenticado
if (sessionStorage.getItem('dna_auth')==='1') openApp();

/* ── TABS ── */
window.switchTab = function(tab) {
  currentTab=tab;
  document.getElementById('tab-visitantes').style.display=tab==='visitantes'?'block':'none';
  document.getElementById('tab-casas').classList.toggle('active',tab==='casas');
  document.getElementById('t-visitantes').classList.toggle('active',tab==='visitantes');
  document.getElementById('t-casas').classList.toggle('active',tab==='casas');
  document.getElementById('btn-refresh').style.display=tab==='visitantes'?'inline-flex':'none';
};
document.getElementById('tab-visitantes').style.display='block';
window.refresh = ()=>loadAll();

/* ── LOAD ── */
async function loadAll() {
  setLoading(true);
  try {
    const [vs,cs] = await Promise.all([
      getDocs(query(collection(db,'visitantes'),orderBy('timestamp','desc'))),
      getDocs(query(collection(db,'casas'),orderBy('timestamp','asc')))
    ]);
    allVisitors = vs.docs.map(d=>({id:d.id,...d.data()}));
    allCasas = cs.docs.map(d=>({id:d.id,...d.data()}));
    updateStats();
    applyFilters();
    renderCasas();
  } catch(e){ 
    console.error('[DNA] Firestore error:',e);
    document.getElementById('content').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Erro ao carregar</div><div class="empty-text">'+e.message+'</div></div>';
  }
  setLoading(false);
}
function setLoading(s){ document.getElementById('loading-bar').style.display=s?'block':'none'; }

/* ── STATS ── */
function updateStats() {
  const dm = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const hoje = allVisitors.filter(v=>v.culto&&v.culto.includes(dm));
  const alerts = allVisitors.filter(v=>needs48hAlert(v));
  document.getElementById('st-hoje').textContent=hoje.length;
  document.getElementById('st-total').textContent=allVisitors.length;
  document.getElementById('st-1a').textContent=hoje.filter(v=>v.primeiraVez).length;
  document.getElementById('st-alert').textContent=alerts.length;
}

function needs48hAlert(v) {
  if (!v.timestamp) return false;
  const ts = v.timestamp.seconds ? v.timestamp.seconds*1000 : new Date(v.timestamp).getTime();
  const diff = Date.now()-ts;
  return diff>48*3600*1000 && !v.msg2Sent;
}

/* ── FILTERS ── */
window.applyFilters = function() {
  const dateVal = document.getElementById('filter-date').value;
  const search = (document.getElementById('search-input').value||'').toLowerCase().trim();
  let filtered = [...allVisitors];
  if (dateVal) { const [y,m,d]=dateVal.split('-'); filtered=filtered.filter(v=>v.culto&&v.culto.includes(`${d}/${m}`)); }
  if (search) filtered=filtered.filter(v=>(v.nome||'').toLowerCase().includes(search)||(v.celular||'').includes(search));
  if (tagFilter==='primeira') filtered=filtered.filter(v=>v.primeiraVez);
  if (tagFilter==='retorno')  filtered=filtered.filter(v=>!v.primeiraVez);
  if (tagFilter==='alert')    filtered=filtered.filter(v=>needs48hAlert(v));
  filteredVisitors=filtered;
  renderVisitors(filtered);
};
window.setTagFilter=function(tag){
  tagFilter=tag;
  ['ftag-all','ftag-1a','ftag-ret','ftag-alert'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const m={'all':'ftag-all','primeira':'ftag-1a','retorno':'ftag-ret','alert':'ftag-alert'};
  document.getElementById(m[tag]).classList.add('active');
  applyFilters();
};
window.clearFilters=function(){
  document.getElementById('filter-date').value='';
  document.getElementById('search-input').value='';
  window.setTagFilter('all');
};

/* ── PROXIMITY ── */
function extractWords(str){
  return (str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>3);
}
function scoreSim(a,b){ const wa=extractWords(a),wb=extractWords(b); return wa.filter(w=>wb.includes(w)).length; }
function getCasasProx(end){ return allCasas.map(c=>({...c,score:scoreSim(end,c.endereco)})).filter(c=>c.score>0).sort((a,b)=>b.score-a.score).slice(0,3); }
function countVisitantesPorCasa(casa){ return allVisitors.filter(v=>v.endereco&&scoreSim(v.endereco,casa.endereco)>0).length; }

/* ── DIAS DESDE CADASTRO ── */
function diasDesde(v) {
  if (!v.timestamp) return null;
  const ts = v.timestamp.seconds ? v.timestamp.seconds*1000 : new Date(v.timestamp).getTime();
  return Math.floor((Date.now()-ts)/(1000*3600*24));
}

/* ── PRIMEIRA VISITA DATA (para retornos) ── */
function primeiraVisitaData(v) {
  if (v.primeiraVez) return null;
  const mesmo = allVisitors.filter(x=>x.nome===v.nome&&x.celular===v.celular&&x.primeiraVez);
  if (mesmo.length && mesmo[0].culto) return mesmo[0].culto;
  return null;
}

/* ── RENDER VISITORS ── */
function renderVisitors(list) {
  const cont=document.getElementById('content');
  if (!list.length){
    cont.innerHTML=`<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-title">Nenhum visitante encontrado</div><div class="empty-text">Tente mudar o filtro.</div></div>`;
    return;
  }
  const groups={};
  list.forEach(v=>{
    const key=v.culto||'Sem data';
    if(!groups[key])groups[key]=[];
    groups[key].push(v);
  });
  let html='';
  Object.entries(groups).forEach(([day,visitors])=>{
    html+=`<div class="day-group"><div class="day-header">${day.charAt(0).toUpperCase()+day.slice(1)}<span class="day-count">${visitors.length} visitante${visitors.length!==1?'s':''}</span></div>`;
    visitors.forEach(v=>{ html+=buildCard(v); });
    html+=`</div>`;
  });
  cont.innerHTML=html;
  // attach events
  cont.querySelectorAll('.visitor-card').forEach(el=>{
    attachLongPress(el,2000,()=>{
      openModal('Excluir visitante',`Tem certeza que deseja excluir <span class="modal-name">${el.dataset.nome}</span>?`,async()=>{
        await deleteDoc(doc(db,'visitantes',el.dataset.id));
        allVisitors=allVisitors.filter(v=>v.id!==el.dataset.id);
        updateStats();applyFilters();
      });
    });
  });
}

function initials(n){ const p=(n||'').trim().split(' ').filter(Boolean); return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(p[0]||'?').slice(0,2).toUpperCase(); }

function msg1(nome){ const n=nome.split(' ')[0]; return `Oi ${n}, tudo bem?\n\nQue alegria ter você com a gente hoje na Terra Fértil! A gente ficou muito feliz com sua presença.\n\nEsperamos que o culto tenha tocado seu coração. Você já faz parte da nossa família e sempre terá um lugar aqui.\n\nQualquer dúvida sobre a nossa igreja, pode chamar!\n\nCom carinho, família Terra Fértil`; }
function msg2(nome){ const n=nome.split(' ')[0]; return `Oi ${n}!\n\nAinda pensando na sua presença com a gente no culto. Foi muito bom ter você aqui!\n\nQueremos muito te ver de novo. A gente se reúne toda terça-feira às 20h e todo domingo às 19h. Você é sempre bem-vindo(a).\n\nConta com a gente. Com muito carinho, família Terra Fértil`; }

function buildCard(v) {
  const ini=initials(v.nome);
  const hasCel=v.celular&&v.celular.length>0;
  const noCel=hasCel?'':'no-cel';
  const casas=getCasasProx(v.endereco||'');
  const alert=needs48hAlert(v);
  const dias=diasDesde(v);
  const firstDate=primeiraVisitaData(v);
  const msg1Sent=!!v.msg1Sent, msg2Sent=!!v.msg2Sent;
  const digits=(v.celular||'').replace(/\D/g,'');
  const link1=hasCel?`https://wa.me/55${digits}?text=${encodeURIComponent(msg1(v.nome))}`:'#';
  const link2=hasCel?`https://wa.me/55${digits}?text=${encodeURIComponent(msg2(v.nome))}`:'#';

  const casasHTML=casas.length?`<div class="casas-sugeridas show"><div class="casas-label">Casas próximas</div>${casas.map(c=>`<span class="casa-pill"><strong>${c.nome}</strong> · ${c.lider}${c.horario?' · '+c.horario:''}</span>`).join('')}</div>`:'';
  const sentBadge1=msg1Sent?`<span class="sent-badge">✓ enviado</span>`:'';
  const sentBadge2=msg2Sent?`<span class="sent-badge">✓ enviado</span>`:'';

  return `<div class="visitor-card" data-id="${v.id}" data-nome="${(v.nome||'').replace(/"/g,'&quot;')}" data-idx="0">
    <div class="press-bar"></div>
    <div class="card-top">
      <div class="avatar">${ini}</div>
      <div class="card-info">
        <div class="card-name">${v.nome||'—'}</div>
        ${v.celular?`<div class="card-row"><svg class="card-icon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.24 16.92z"/></svg><span class="card-text">${v.celular}</span></div>`:''}
        ${v.endereco?`<div class="card-row"><svg class="card-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span class="card-text">${v.endereco}</span></div>`:''}
        <div class="card-meta">
          <span class="tag ${v.primeiraVez?'primeira':'retorno'}">${v.primeiraVez?'1ª Visita':'Retorno'}</span>
          ${v.horario?`<span class="tag hora">${v.horario}</span>`:''}
          ${dias!==null?`<span class="tag dias">${dias===0?'hoje':dias===1?'1 dia':dias+' dias'}</span>`:''}
          ${alert?`<span class="tag alert48">⚠ 48h</span>`:''}
          ${firstDate&&!v.primeiraVez?`<span class="tag dias">1ª visita: ${firstDate.split(',')[0]||firstDate}</span>`:''}
          ${!hasCel?`<span class="tag hora" style="color:rgba(255,100,100,.6)">Sem celular</span>`:''}
        </div>
      </div>
    </div>
    ${casasHTML}
    <div class="card-notes">
      <button class="notes-toggle" onclick="toggleNote(this)">
        <span class="arrow">▶</span> Anotações${v.notas?` <span style='color:var(--rb);font-size:9px'>● nota salva</span>`:''}
      </button>
      <div class="notes-inner${v.notas?' open':''}">
        <textarea class="notes-ta" id="notes-${v.id}" placeholder="Registre observações sobre este visitante...">${v.notas||''}</textarea>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <button class="notes-save" onclick="saveNote('${v.id}')">Salvar nota</button>
          <span class="notes-saved" id="saved-${v.id}">Salvo!</span>
        </div>
      </div>
    </div>
    <div class="card-actions">
      <a class="wa-btn msg1 ${noCel} ${msg1Sent?'sent':''}" href="${link1}" target="_blank" rel="noopener" onclick="markSent('${v.id}','msg1')">${waIcon} Boas-vindas${sentBadge1}</a>
      <a class="wa-btn msg2 ${noCel} ${msg2Sent?'sent':''}" href="${link2}" target="_blank" rel="noopener" onclick="markSent('${v.id}','msg2')">${waIcon} Follow-up${sentBadge2}</a>
    </div>

  </div>`;
}



/* TOGGLE NOTE */
window.toggleNote = function(btn) {
  btn.classList.toggle('open');
  const inner = btn.nextElementSibling;
  inner.classList.toggle('open');
};

/* SAVE NOTE */
window.saveNote = async function(id) {
  const val = document.getElementById('notes-'+id).value.trim();
  try {
    await updateDoc(doc(db,'visitantes',id),{notas:val});
    const saved=document.getElementById('saved-'+id);
    saved.style.display='inline';
    setTimeout(()=>saved.style.display='none',2000);
    const v=allVisitors.find(x=>x.id===id);
    if(v) v.notas=val;
  } catch(e){ alert('Erro ao salvar.'); }
};

/* MARK SENT */
window.markSent = async function(id, field) {
  try {
    const update={};
    update[field+'Sent']=true;
    update[field+'SentAt']=new Date().toLocaleString('pt-BR');
    await updateDoc(doc(db,'visitantes',id),update);
    const v=allVisitors.find(x=>x.id===id);
    if(v){v[field+'Sent']=true;}
    // update badge visually
    const card=document.querySelector(`[data-id="${id}"]`);
    if(card){
      const btn=card.querySelector(`.wa-btn.${field}`);
      if(btn){btn.classList.add('sent');if(!btn.querySelector('.sent-badge')){const s=document.createElement('span');s.className='sent-badge';s.textContent='✓ enviado';btn.appendChild(s);}}
    }
    updateStats();
  } catch(e){ console.error(e); }
};

/* EXPORT CSV */
window.exportCSV = function() {
  const rows=[['Nome','Celular','Endereço','Tipo','Culto','Horário','Boas-vindas','Follow-up','Anotações']];
  filteredVisitors.forEach(v=>{
    rows.push([v.nome||'',v.celular||'',v.endereco||'',v.primeiraVez?'1ª Visita':'Retorno',v.culto||'',v.horario||'',v.msg1Sent?'Sim':'Não',v.msg2Sent?'Sim':'Não',v.notas||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${(c+'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`visitantes_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
};

/* CASAS */
window.loadCasas = async function() {
  try {
    const snap=await getDocs(query(collection(db,'casas'),orderBy('timestamp','asc')));
    allCasas=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCasas();
  } catch(e){console.error(e);}
};
function renderCasas() {
  const list=document.getElementById('casas-list');
  document.getElementById('casas-list-title').textContent=`Casas Cadastradas (${allCasas.length})`;
  if(!allCasas.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">🏠</div><div class="empty-title">Nenhuma casa cadastrada</div></div>`;return;}
  list.innerHTML=allCasas.map((c,i)=>{
    const count=countVisitantesPorCasa(c);
    return `<div class="casa-card" data-id="${c.id}" data-nome="${(c.nome||'').replace(/"/g,'&quot;')}">
      <div class="press-bar"></div>
      <div class="casa-num">${i+1}</div>
      <div class="casa-info">
        <div class="casa-nome">${c.nome||'—'}</div>
        <div class="casa-lider">Líder: ${c.lider||'—'}</div>
        ${c.endereco?`<div class="casa-end">${c.endereco}</div>`:''}
        ${c.horario?`<div class="casa-end" style="color:var(--rb);margin-top:2px">${c.horario}</div>`:''}
        ${count>0?`<div class="casa-count">${count} visitante${count!==1?'s':''} sugerido${count!==1?'s':''}</div>`:''}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.casa-card').forEach(el=>{
    attachLongPress(el,2000,()=>{
      openModal('Excluir casa',`Tem certeza que deseja excluir <span class="modal-name">${el.dataset.nome}</span>?`,async()=>{
        await deleteDoc(doc(db,'casas',el.dataset.id));
        allCasas=allCasas.filter(c=>c.id!==el.dataset.id);
        renderCasas();applyFilters();
      });
    });
  });
}
window.addCasa = async function() {
  const nome=document.getElementById('c-nome').value.trim();
  const lider=document.getElementById('c-lider').value.trim();
  const end=document.getElementById('c-end').value.trim();
  const horario=document.getElementById('c-horario').value.trim();
  if(!nome||!lider||!end){alert('Preencha nome, líder e endereço.');return;}
  const btn=document.getElementById('btn-add-casa');btn.disabled=true;
  try {
    const ref=await addDoc(collection(db,'casas'),{nome,lider,endereco:end,horario:horario||null,timestamp:serverTimestamp()});
    allCasas.push({id:ref.id,nome,lider,endereco:end,horario:horario||null});
    ['c-nome','c-lider','c-end','c-horario'].forEach(id=>document.getElementById(id).value='');
    renderCasas();
  } catch(e){alert('Erro ao salvar.');}
  btn.disabled=false;
};

/* LONG PRESS */
function attachLongPress(el,dur,cb){
  let timer=null,bar=el.querySelector('.press-bar'),startTime,af,startX,startY,moved=false;
  function anim(){const p=Math.min((Date.now()-startTime)/dur*100,100);if(bar)bar.style.width=p+'%';if(p<100)af=requestAnimationFrame(anim);}
  function start(e){
    // only start on direct card touch, not on buttons/links/textareas inside
    if(e.target.tagName==='BUTTON'||e.target.tagName==='A'||e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
    moved=false;
    startX=e.touches?e.touches[0].clientX:e.clientX;
    startY=e.touches?e.touches[0].clientY:e.clientY;
    el.classList.add('pressing');startTime=Date.now();
    if(bar){bar.style.transition='none';bar.style.width='0';}
    af=requestAnimationFrame(anim);
    timer=setTimeout(()=>{if(!moved){cancel();cb();}},dur);
  }
  function move(e){
    const dx=Math.abs((e.touches?e.touches[0].clientX:e.clientX)-startX);
    const dy=Math.abs((e.touches?e.touches[0].clientY:e.clientY)-startY);
    if(dx>8||dy>8){moved=true;cancel();}
  }
  function cancel(){clearTimeout(timer);cancelAnimationFrame(af);el.classList.remove('pressing');if(bar)bar.style.width='0';}
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchmove',move,{passive:true});
  el.addEventListener('mouseup',cancel);el.addEventListener('mouseleave',cancel);
  el.addEventListener('touchend',cancel);el.addEventListener('touchcancel',cancel);
}

/* MODAL */
let pendingAction=null;
function openModal(title,desc,action){
  pendingAction=action;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-desc').innerHTML=desc;
  document.getElementById('confirm-modal').classList.add('show');
}
window.closeModal=function(){document.getElementById('confirm-modal').classList.remove('show');pendingAction=null;};
document.getElementById('modal-confirm-btn').onclick=async function(){
  if(pendingAction){this.disabled=true;this.textContent='...';await pendingAction();this.disabled=false;this.textContent='Excluir';}
  window.closeModal();
};
document.getElementById('confirm-modal').addEventListener('click',function(e){if(e.target===this)window.closeModal();});
setInterval(loadAll,60000);
